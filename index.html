<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Tournament Manager - Live Scores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .match-card { transition: all 0.2s ease; }
        .match-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: flex; }
        body.admin-mode .viewer-only { display: none; }
        .toast { transition: opacity 0.3s ease; }
        .live-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-900 mb-2">🏆 Tournament Manager</h1>
                <p class="text-gray-500 uppercase tracking-widest text-sm font-semibold">Live Match Fixtures & Standings</p>
                <div id="liveStatus" class="hidden mt-2">
                    <span class="live-badge inline-flex items-center gap-1 text-xs text-green-600 bg-green-50 px-2 py-1 rounded-full">
                        <span class="w-2 h-2 bg-green-600 rounded-full animate-pulse"></span>
                        🔴 Live Updates Active
                    </span>
                </div>
            </div>
            
            <!-- Auth Controls -->
            <div id="authControls" class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm border">
                <div id="userInfo" class="text-sm text-gray-600 hidden mr-2">
                    👤 <span id="userEmail" class="font-medium"></span>
                </div>
                <button id="loginBtn" onclick="showLoginModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold transition-colors">
                    🔐 Admin Login
                </button>
                <button id="logoutBtn" onclick="logout()" class="hidden px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-bold transition-colors">
                    🚪 Logout
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Match Fixtures -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-5 rounded-2xl shadow-sm gap-4 border border-gray-100">
                    <h2 class="text-xl font-bold text-gray-800">📅 Match Fixtures</h2>
                    <div class="flex items-center gap-3">
                        <label for="matchdaySelect" class="text-sm font-medium text-gray-600">Select Week:</label>
                        <select id="matchdaySelect" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-2.5 font-semibold" onchange="renderMatches()">
                            <!-- Options generated by JS -->
                        </select>
                    </div>
                </div>

                <div id="matchesContainer" class="grid gap-4">
                    <!-- Matches will appear here -->
                </div>
            </div>

            <!-- Right Side: Points Table -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 sticky top-4">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5">
                        <h2 class="text-white font-bold text-xl flex items-center gap-2">
                            <span>📊</span> Standings
                        </h2>
                    </div>
                    <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-500 uppercase bg-gray-50 border-b sticky top-0">
                                <tr>
                                    <th class="px-4 py-4">Player</th>
                                    <th class="px-2 py-4 text-center">P</th>
                                    <th class="px-2 py-4 text-center">W</th>
                                    <th class="px-2 py-4 text-center">D</th>
                                    <th class="px-2 py-4 text-center">L</th>
                                    <th class="px-4 py-4 text-center font-bold text-blue-600">Pts</th>
                                </tr>
                            </thead>
                            <tbody id="pointsTableBody" class="divide-y divide-gray-100">
                                <!-- Table rows generated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <div class="p-4 bg-gray-50 text-xs text-gray-400 text-center italic border-t">
                        Win: 3 | Draw: 1 | Loss: 0
                    </div>
                </div>
                
                <!-- Reset Data (Admin Only) -->
                <div class="admin-only mt-4">
                    <button onclick="resetAllScores()" class="w-full py-3 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-sm font-bold transition-colors border border-red-200">
                        🗑️ Reset All Scores
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold mb-4">🔐 Admin Login</h3>
            <input type="email" id="loginEmail" class="w-full p-3 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email">
            <input type="password" id="loginPassword" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password">
            <div class="flex gap-2">
                <button onclick="closeLoginModal()" class="flex-1 py-2 bg-gray-100 rounded-lg font-semibold hover:bg-gray-200 transition">Cancel</button>
                <button onclick="loginWithEmail()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">Login</button>
            </div>
            <p id="loginError" class="text-red-500 text-xs mt-2 hidden"></p>
            <hr class="my-4">
            <button onclick="showSignupModal()" class="w-full text-center text-sm text-blue-600 hover:text-blue-700">
                Don't have an account? Sign up
            </button>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold mb-4">📝 Create Admin Account</h3>
            <input type="email" id="signupEmail" class="w-full p-3 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Email">
            <input type="password" id="signupPassword" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password (min 6 chars)">
            <div class="flex gap-2">
                <button onclick="closeSignupModal()" class="flex-1 py-2 bg-gray-100 rounded-lg font-semibold hover:bg-gray-200 transition">Cancel</button>
                <button onclick="signup()" class="flex-1 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition">Sign Up</button>
            </div>
            <p id="signupError" class="text-red-500 text-xs mt-2 hidden"></p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm hidden toast z-50">
        🔄 Updating...
    </div>

    <script>
        // ========== YOUR CORRECT FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyBPkmaWLWad7Vn5RzlnZv-mLZgMaHv7xIg",
            authDomain: "e-war-5f8a6.firebaseapp.com",
            databaseURL: "https://e-war-5f8a6-default-rtdb.firebaseio.com",
            projectId: "e-war-5f8a6",
            storageBucket: "e-war-5f8a6.firebasestorage.app",
            messagingSenderId: "628352167173",
            appId: "1:628352167173:web:744a3d3cca25a1ae695b6c",
            measurementId: "G-JKCQKF6FY7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ========== TOURNAMENT DATA ==========
        const players = ["Shammas", "Ameen", "Suhail", "Aslah", "Nisam", "Fadhil", "Yaseen", "Shahul", "Mirshad", "Fathah"];
        
        const fixtures = {
            1: [["Shammas", "Ameen"], ["Suhail", "Aslah"], ["Nisam", "Fadhil"], ["Yaseen", "Shahul"], ["Mirshad", "Fathah"]],
            2: [["Shammas", "Suhail"], ["Ameen", "Aslah"], ["Nisam", "Yaseen"], ["Fadhil", "Shahul"], ["Mirshad", "Shahul"]],
            3: [["Shammas", "Aslah"], ["Suhail", "Ameen"], ["Nisam", "Shahul"], ["Yaseen", "Fadhil"], ["Mirshad", "Nisam"]],
            4: [["Shammas", "Nisam"], ["Aslah", "Suhail"], ["Ameen", "Fadhil"], ["Yaseen", "Mirshad"], ["Shahul", "Fathah"]],
            5: [["Shammas", "Fadhil"], ["Nisam", "Ameen"], ["Aslah", "Yaseen"], ["Suhail", "Mirshad"], ["Shahul", "Fathah"]],
            6: [["Shammas", "Yaseen"], ["Fadhil", "Nisam"], ["Ameen", "Mirshad"], ["Aslah", "Shahul"], ["Suhail", "Fathah"]],
            7: [["Shammas", "Shahul"], ["Yaseen", "Ameen"], ["Fadhil", "Aslah"], ["Nisam", "Suhail"], ["Mirshad", "Fathah"]],
            8: [["Shammas", "Mirshad"], ["Shahul", "Nisam"], ["Yaseen", "Suhail"], ["Fadhil", "Ameen"], ["Aslah", "Fathah"]],
            9: [["Shammas", "Fathah"], ["Mirshad", "Fadhil"], ["Shahul", "Ameen"], ["Yaseen", "Nisam"], ["Suhail", "Aslah"]]
        };

        let scores = {};
        let currentUser = null;
        let isUpdating = false;

        // ========== AUTH FUNCTIONS ==========
        function showLoginModal() { 
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('loginEmail').focus();
        }
        
        function closeLoginModal() { 
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        function showSignupModal() {
            closeLoginModal();
            document.getElementById('signupModal').style.display = 'flex';
        }
        
        function closeSignupModal() {
            document.getElementById('signupModal').style.display = 'none';
            document.getElementById('signupError').classList.add('hidden');
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
        }

        async function loginWithEmail() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                closeLoginModal();
                showToast('✅ Logged in as admin!', 'success');
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function signup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                closeSignupModal();
                showToast('✅ Account created! You can now edit scores.', 'success');
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        }

        async function logout() {
            await auth.signOut();
            showToast('👋 Logged out', 'info');
        }

        // ========== REALTIME DATABASE SYNC ==========
        function setupRealtimeSync() {
            const scoresRef = database.ref('tournament/scores');
            
            // Listen for real-time changes from Firebase
            scoresRef.on('value', (snapshot) => {
                if (!isUpdating) {
                    const data = snapshot.val();
                    scores = data || {};
                    renderMatches();
                    updateTable();
                    
                    // Show notification for viewers when scores change
                    if (!currentUser) {
                        showToast('🔄 Scores updated by admin!', 'info');
                    }
                }
            });
            
            // Show live status
            document.getElementById('liveStatus').classList.remove('hidden');
        }

        async function saveScoreToRealtimeDB(matchId, playerKey, value) {
            if (!currentUser) {
                showToast('❌ Please login to update scores', 'error');
                renderMatches(); // Reset the input
                return false;
            }
            
            isUpdating = true;
            
            // Update local scores first for immediate feedback
            if (!scores[matchId]) scores[matchId] = { s1: '', s2: '' };
            scores[matchId][playerKey] = value === '' ? '' : parseInt(value);
            
            try {
                // Save to Firebase Realtime Database
                await database.ref('tournament/scores').set(scores);
                showToast('✅ Score saved! Everyone can see it now.', 'success');
                return true;
            } catch (error) {
                console.error('Error saving:', error);
                showToast('❌ Failed to save: ' + error.message, 'error');
                return false;
            } finally {
                isUpdating = false;
            }
        }

        async function resetAllScores() {
            if (!currentUser) {
                showToast('❌ Login required to reset scores', 'error');
                return;
            }
            
            if (confirm('⚠️ RESET ALL SCORES?\n\nThis will delete every match score and cannot be undone. Everyone will see the empty scores immediately.')) {
                isUpdating = true;
                try {
                    await database.ref('tournament/scores').set({});
                    scores = {};
                    renderMatches();
                    updateTable();
                    showToast('🗑️ All scores have been reset!', 'success');
                } catch (error) {
                    showToast('❌ Failed to reset: ' + error.message, 'error');
                } finally {
                    isUpdating = false;
                }
            }
        }

        // ========== UI FUNCTIONS ==========
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '🔄';
            toast.innerHTML = `${icon} ${message}`;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2500);
        }

        function updateAuthUI(user) {
            currentUser = user;
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const userInfo = document.getElementById('userInfo');
            const userEmailSpan = document.getElementById('userEmail');
            
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userInfo.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
                document.body.classList.add('admin-mode');
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userInfo.classList.add('hidden');
                document.body.classList.remove('admin-mode');
            }
            renderMatches();
        }

        function init() {
            // Setup matchday select
            const select = document.getElementById('matchdaySelect');
            for(let i = 1; i <= 9; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = `Matchday ${i}`;
                select.appendChild(opt);
            }
            
            // Auth state listener
            auth.onAuthStateChanged((user) => {
                updateAuthUI(user);
            });
            
            // Setup real-time sync
            setupRealtimeSync();
        }

        function renderMatches() {
            const day = document.getElementById('matchdaySelect').value;
            const container = document.getElementById('matchesContainer');
            if (!container) return;
            container.innerHTML = '';

            fixtures[day].forEach((match, index) => {
                const matchId = `${day}-${index}`;
                const s1 = scores[matchId]?.s1 ?? '';
                const s2 = scores[matchId]?.s2 ?? '';
                
                const isPlayed = s1 !== '' && s2 !== '';
                const scoreDisplay = isPlayed ? `${s1} - ${s2}` : 'vs';

                const div = document.createElement('div');
                div.className = "match-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center shadow-sm";
                div.innerHTML = `
                    <div class="flex-1 text-right pr-6 font-bold text-gray-800 text-lg">${match[0]}</div>
                    
                    <div class="admin-only items-center gap-4 bg-gray-50 p-2 rounded-xl border border-gray-200">
                        <input type="number" value="${s1}" onchange="saveScoreToRealtimeDB('${matchId}', 's1', this.value)" 
                               class="w-12 h-12 text-center bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold text-gray-900 shadow-inner"
                               placeholder="-">
                        <span class="text-gray-400 font-black text-xs uppercase">VS</span>
                        <input type="number" value="${s2}" onchange="saveScoreToRealtimeDB('${matchId}', 's2', this.value)" 
                               class="w-12 h-12 text-center bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold text-gray-900 shadow-inner"
                               placeholder="-">
                    </div>

                    <div class="viewer-only items-center justify-center min-w-[80px] bg-gray-50 px-4 py-2 rounded-xl border border-gray-200 font-black text-xl ${isPlayed ? 'text-blue-700' : 'text-gray-400'}">
                        ${scoreDisplay}
                    </div>

                    <div class="flex-1 text-left pl-6 font-bold text-gray-800 text-lg">${match[1]}</div>
                `;
                container.appendChild(div);
            });
        }

        function updateTable() {
            let stats = {};
            players.forEach(p => stats[p] = { played: 0, w: 0, d: 0, l: 0, pts: 0, gd: 0 });

            Object.keys(scores).forEach(matchId => {
                const [day, index] = matchId.split('-');
                const match = fixtures[day]?.[parseInt(index)];
                const s = scores[matchId];

                if (match && s && s.s1 !== '' && s.s2 !== '' && s.s1 !== null && s.s2 !== null && !isNaN(s.s1) && !isNaN(s.s2)) {
                    const p1 = match[0];
                    const p2 = match[1];

                    stats[p1].played++;
                    stats[p2].played++;
                    
                    stats[p1].gd += (s.s1 - s.s2);
                    stats[p2].gd += (s.s2 - s.s1);

                    if (s.s1 > s.s2) {
                        stats[p1].w++; stats[p1].pts += 3;
                        stats[p2].l++;
                    } else if (s.s1 < s.s2) {
                        stats[p2].w++; stats[p2].pts += 3;
                        stats[p1].l++;
                    } else {
                        stats[p1].d++; stats[p1].pts += 1;
                        stats[p2].d++; stats[p2].pts += 1;
                    }
                }
            });

            const sortedPlayers = [...players].sort((a, b) => {
                if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
                if (stats[b].gd !== stats[a].gd) return stats[b].gd - stats[a].gd;
                return stats[b].w - stats[a].w;
            });
            
            const tbody = document.getElementById('pointsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            sortedPlayers.forEach((p, idx) => {
                const s = stats[p];
                const row = `
                    <tr class="bg-white hover:bg-blue-50 transition-colors">
                        <td class="px-4 py-4 flex items-center gap-3">
                            <span class="text-xs text-gray-400 font-mono w-4">${idx + 1}</span>
                            <span class="font-bold text-gray-900">${p}</span>
                        </td>
                        <td class="px-2 py-4 text-center font-medium text-gray-600">${s.played}</td>
                        <td class="px-2 py-4 text-center font-bold text-green-600">${s.w}</td>
                        <td class="px-2 py-4 text-center font-bold text-amber-500">${s.d}</td>
                        <td class="px-2 py-4 text-center font-bold text-red-500">${s.l}</td>
                        <td class="px-4 py-4 text-center font-black text-blue-700 bg-blue-50/50">${s.pts}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Make functions globally available
        window.saveScoreToRealtimeDB = saveScoreToRealtimeDB;
        window.resetAllScores = resetAllScores;
        window.showLoginModal = showLoginModal;
        window.closeLoginModal = closeLoginModal;
        window.showSignupModal = showSignupModal;
        window.closeSignupModal = closeSignupModal;
        window.loginWithEmail = loginWithEmail;
        window.signup = signup;
        window.logout = logout;
        window.renderMatches = renderMatches;

        // Start the app
        init();
    </script>
</body>
</html>
