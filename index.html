<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager & Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .match-card {
            transition: all 0.2s ease;
        }
        .match-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .admin-only {
            display: none;
        }
        body.admin-mode .admin-only {
            display: flex;
        }
        body.admin-mode .viewer-only {
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-extrabold text-gray-900 mb-2">🏆 Tournament Manager</h1>
                <p class="text-gray-500 uppercase tracking-widest text-sm font-semibold">Match Fixtures & League Standings</p>
            </div>
            
            <!-- Admin Toggle -->
            <div id="adminControls" class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm border">
                <button id="adminBtn" onclick="toggleAdmin()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-bold transition-colors">
                    🔓 Admin Login
                </button>
                <button id="logoutBtn" onclick="logout()" class="hidden px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-bold transition-colors">
                    🔒 Logout
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Match Fixtures -->
            <div class="lg:col-span-2 space-y-6">
                <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-5 rounded-2xl shadow-sm gap-4 border border-gray-100">
                    <h2 class="text-xl font-bold text-gray-800">📅 Match Fixtures</h2>
                    <div class="flex items-center gap-3">
                        <label for="matchdaySelect" class="text-sm font-medium text-gray-600">Select Week:</label>
                        <select id="matchdaySelect" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-2.5 font-semibold" onchange="renderMatches()">
                            <!-- Options generated by JS -->
                        </select>
                    </div>
                </div>

                <div id="matchesContainer" class="grid gap-4">
                    <!-- Matches will appear here -->
                </div>
            </div>

            <!-- Right Side: Points Table -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5">
                        <h2 class="text-white font-bold text-xl flex items-center gap-2">
                            <span>📊</span> Standings
                        </h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-gray-500 uppercase bg-gray-50 border-b">
                                <tr>
                                    <th class="px-4 py-4">Player</th>
                                    <th class="px-2 py-4 text-center">P</th>
                                    <th class="px-2 py-4 text-center">W</th>
                                    <th class="px-2 py-4 text-center">D</th>
                                    <th class="px-2 py-4 text-center">L</th>
                                    <th class="px-4 py-4 text-center font-bold text-blue-600">Pts</th>
                                </tr>
                            </thead>
                            <tbody id="pointsTableBody" class="divide-y divide-gray-100">
                                <!-- Table rows generated by JS -->
                            </tbody>
                        </table>
                    </div>
                    <div class="p-4 bg-gray-50 text-xs text-gray-400 text-center italic">
                        Win: 3 | Draw: 1 | Loss: 0
                    </div>
                </div>
                
                <!-- Reset Data (Admin Only) -->
                <div class="admin-only mt-4">
                    <button onclick="resetData()" class="w-full py-3 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl text-sm font-bold transition-colors border border-red-200">
                        🗑️ Reset All Scores
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Simple Password Modal -->
    <div id="passwordModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold mb-4">Admin Authentication</h3>
            <input type="password" id="adminPassword" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter password...">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 rounded-lg font-semibold">Cancel</button>
                <button onclick="checkPassword()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-semibold">Login</button>
            </div>
            <p id="errorMsg" class="text-red-500 text-xs mt-2 hidden">Incorrect password. Try again.</p>
        </div>
    </div>

    <script>
        const players = ["Shammas", "Ameen", "Suhail", "Aslah", "Nisam", "Fadhil", "Yaseen", "Shahul", "Mirshad", "Fathah"];
        const ADMIN_PASSWORD = "ewar0"; // Updated Password
        
        const fixtures = {
            1: [["Shammas", "Ameen"], ["Suhail", "Aslah"], ["Nisam", "Fadhil"], ["Yaseen", "Shahul"], ["Mirshad", "Fathah"]],
            2: [["Shammas", "Suhail"], ["Ameen", "Aslah"], ["Nisam", "Yaseen"], ["Fadhil", "Shahul"], ["Mirshad", "Shahul"]],
            3: [["Shammas", "Aslah"], ["Suhail", "Ameen"], ["Nisam", "Shahul"], ["Yaseen", "Fadhil"], ["Mirshad", "Nisam"]],
            4: [["Shammas", "Nisam"], ["Aslah", "Suhail"], ["Ameen", "Fadhil"], ["Yaseen", "Mirshad"], ["Shahul", "Fathah"]],
            5: [["Shammas", "Fadhil"], ["Nisam", "Ameen"], ["Aslah", "Yaseen"], ["Suhail", "Mirshad"], ["Shahul", "Fathah"]],
            6: [["Shammas", "Yaseen"], ["Fadhil", "Nisam"], ["Ameen", "Mirshad"], ["Aslah", "Shahul"], ["Suhail", "Fathah"]],
            7: [["Shammas", "Shahul"], ["Yaseen", "Ameen"], ["Fadhil", "Aslah"], ["Nisam", "Suhail"], ["Mirshad", "Fathah"]],
            8: [["Shammas", "Mirshad"], ["Shahul", "Nisam"], ["Yaseen", "Suhail"], ["Fadhil", "Ameen"], ["Aslah", "Fathah"]],
            9: [["Shammas", "Fathah"], ["Mirshad", "Fadhil"], ["Shahul", "Ameen"], ["Yaseen", "Nisam"], ["Suhail", "Aslah"]]
        };

        // Load scores from Local Storage
        let scores = JSON.parse(localStorage.getItem('tournament_scores')) || {};
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

        function init() {
            const select = document.getElementById('matchdaySelect');
            for(let i=1; i<=9; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = `Matchday ${i}`;
                select.appendChild(opt);
            }
            if (isAdmin) document.body.classList.add('admin-mode');
            updateUI();
            renderMatches();
            updateTable();
        }

        // Admin Logic
        function toggleAdmin() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('adminPassword').focus();
        }

        function closeModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }

        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASSWORD) {
                isAdmin = true;
                sessionStorage.setItem('isAdmin', 'true');
                document.body.classList.add('admin-mode');
                updateUI();
                closeModal();
                renderMatches();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        function logout() {
            isAdmin = false;
            sessionStorage.removeItem('isAdmin');
            document.body.classList.remove('admin-mode');
            updateUI();
            renderMatches();
        }

        function updateUI() {
            document.getElementById('adminBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
        }

        function resetData() {
            if (confirm("Are you sure you want to delete ALL scores? This cannot be undone.")) {
                scores = {};
                localStorage.removeItem('tournament_scores');
                renderMatches();
                updateTable();
            }
        }

        function renderMatches() {
            const day = document.getElementById('matchdaySelect').value;
            const container = document.getElementById('matchesContainer');
            container.innerHTML = '';

            fixtures[day].forEach((match, index) => {
                const matchId = `${day}-${index}`;
                const s1 = scores[matchId]?.s1 ?? '';
                const s2 = scores[matchId]?.s2 ?? '';
                
                const isPlayed = s1 !== '' && s2 !== '';
                const scoreDisplay = isPlayed ? `${s1} - ${s2}` : 'vs';

                const div = document.createElement('div');
                div.className = "match-card bg-white p-5 rounded-2xl border border-gray-100 flex items-center shadow-sm";
                div.innerHTML = `
                    <div class="flex-1 text-right pr-6 font-bold text-gray-800 text-lg">${match[0]}</div>
                    
                    <div class="admin-only items-center gap-4 bg-gray-50 p-2 rounded-xl border border-gray-200">
                        <input type="number" value="${s1}" oninput="saveScore('${matchId}', 's1', this.value)" 
                               class="w-12 h-12 text-center bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold text-gray-900 shadow-inner">
                        <span class="text-gray-400 font-black text-xs uppercase">VS</span>
                        <input type="number" value="${s2}" oninput="saveScore('${matchId}', 's2', this.value)" 
                               class="w-12 h-12 text-center bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold text-gray-900 shadow-inner">
                    </div>

                    <div class="viewer-only items-center justify-center min-w-[80px] bg-gray-50 px-4 py-2 rounded-xl border border-gray-200 font-black text-xl ${isPlayed ? 'text-blue-700' : 'text-gray-400'}">
                        ${scoreDisplay}
                    </div>

                    <div class="flex-1 text-left pl-6 font-bold text-gray-800 text-lg">${match[1]}</div>
                `;
                container.appendChild(div);
            });
        }

        function saveScore(matchId, playerKey, value) {
            if (!scores[matchId]) scores[matchId] = { s1: '', s2: '' };
            scores[matchId][playerKey] = value === '' ? '' : parseInt(value);
            // Persistent Storage
            localStorage.setItem('tournament_scores', JSON.stringify(scores));
            updateTable();
        }

        function updateTable() {
            let stats = {};
            players.forEach(p => stats[p] = { played: 0, w: 0, d: 0, l: 0, pts: 0, gd: 0 });

            Object.keys(scores).forEach(matchId => {
                const [day, index] = matchId.split('-');
                const match = fixtures[day][index];
                const s = scores[matchId];

                if (s.s1 !== '' && s.s2 !== '' && s.s1 !== null && s.s2 !== null) {
                    const p1 = match[0];
                    const p2 = match[1];

                    stats[p1].played++;
                    stats[p2].played++;
                    
                    stats[p1].gd += (s.s1 - s.s2);
                    stats[p2].gd += (s.s2 - s.s1);

                    if (s.s1 > s.s2) {
                        stats[p1].w++; stats[p1].pts += 3;
                        stats[p2].l++;
                    } else if (s.s1 < s.s2) {
                        stats[p2].w++; stats[p2].pts += 3;
                        stats[p1].l++;
                    } else {
                        stats[p1].d++; stats[p1].pts += 1;
                        stats[p2].d++; stats[p2].pts += 1;
                    }
                }
            });

            const sortedPlayers = [...players].sort((a, b) => {
                if (stats[b].pts !== stats[a].pts) return stats[b].pts - stats[a].pts;
                if (stats[b].gd !== stats[a].gd) return stats[b].gd - stats[a].gd;
                return stats[b].w - stats[a].w;
            });
            
            const tbody = document.getElementById('pointsTableBody');
            tbody.innerHTML = '';
            sortedPlayers.forEach((p, idx) => {
                const s = stats[p];
                const row = `
                    <tr class="bg-white hover:bg-blue-50 transition-colors">
                        <td class="px-4 py-4 flex items-center gap-3">
                            <span class="text-xs text-gray-400 font-mono w-4">${idx + 1}</span>
                            <span class="font-bold text-gray-900">${p}</span>
                        </td>
                        <td class="px-2 py-4 text-center font-medium text-gray-600">${s.played}</td>
                        <td class="px-2 py-4 text-center font-bold text-green-600">${s.w}</td>
                        <td class="px-2 py-4 text-center font-bold text-amber-500">${s.d}</td>
                        <td class="px-2 py-4 text-center font-bold text-red-500">${s.l}</td>
                        <td class="px-4 py-4 text-center font-black text-blue-700 bg-blue-50/50">${s.pts}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
