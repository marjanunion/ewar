<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eWAR | Global Arena - Real-time eSports Manager</title>
    <!-- Tailwind + Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0a0f18; color: #f1f5f9; }
        .glass-card { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .emerald-gradient { background: linear-gradient(135deg, #34d399 0%, #06b6d4 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        input:focus, select:focus { border-color: #10b981 !important; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
        .modal-transition { transition: opacity 0.2s ease, visibility 0.2s; }
        .toast-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            animation: slideUp 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen pb-28">

    <!-- Toast notification container -->
    <div id="toast" class="toast-notification hidden"></div>

    <!-- Firebase Configuration -->
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBk1d837ftOEGco6B5bP0iTQwyKLw7VpeU",
            authDomain: "ewar-fa1db.firebaseapp.com",
            projectId: "ewar-fa1db",
            storageBucket: "ewar-fa1db.firebasestorage.app",
            messagingSenderId: "287555570705",
            appId: "1:287555570705:web:bfbd53a520cf7fb8daf5b0",
            measurementId: "G-3P3RYNZXL0",
            databaseURL: "https://ewar-fa1db-default-rtdb.firebaseio.com"
        };
        
        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        console.log("🔥 Firebase initialized");
        
        // Test database connection
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                console.log("✅ Connected to Firebase Realtime Database");
                showToast("Connected to Firebase!", "success");
            } else {
                console.log("❌ Disconnected from Firebase");
                showToast("⚠️ Firebase connection issue", "error");
            }
        });
        
        function showToast(message, type = "info") {
            const toast = document.getElementById('toast');
            toast.className = `toast-notification ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'} text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg`;
            toast.innerHTML = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }
    </script>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-card border-b border-slate-800/50 px-5 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="showDashboard()">
            <div class="w-9 h-9 emerald-gradient rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20 rotate-3">
                <i data-lucide="trophy" class="text-slate-900 w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-black italic text-lg leading-tight tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">eWAR</h1>
                <p class="text-[8px] font-bold text-slate-500 tracking-[0.2em] -mt-1">GLOBAL ARENA</p>
            </div>
        </div>
        <div class="flex gap-2">
            <div class="hidden sm:flex items-center gap-1 bg-slate-900 px-3 py-1 rounded-full border border-slate-700">
                <i data-lucide="globe" class="w-3 h-3 text-emerald-400"></i>
                <span class="text-[9px] font-mono text-slate-300">LIVE SYNC</span>
            </div>
            <button onclick="clearAllData()" class="p-2 bg-slate-900 rounded-xl border border-slate-800 hover:bg-red-500/10 transition-all">
                <i data-lucide="trash-2" class="w-4 h-4 text-slate-400 hover:text-red-500"></i>
            </button>
        </div>
    </nav>

    <!-- Dashboard -->
    <main id="dashboard-view" class="max-w-2xl mx-auto p-5 space-y-6 animate-slide-up">
        <section class="relative overflow-hidden bg-slate-900 rounded-2xl p-6 border border-slate-800">
            <div class="relative z-10">
                <h2 class="text-2xl font-black">Live <span class="text-emerald-400">Arenas</span></h2>
                <p class="text-slate-400 text-xs">Real-time score updates • Password-protected rooms</p>
            </div>
            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 blur-[70px] rounded-full"></div>
        </section>
        <div class="flex justify-between items-center">
            <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-widest flex items-center gap-2"><i data-lucide="layers"></i> ACTIVE TOURNAMENTS</h3>
            <span id="room-count-badge" class="text-[9px] bg-slate-800 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="tournament-list" class="grid gap-3">
            <div class="py-16 text-center border-2 border-dashed border-slate-800 rounded-2xl">
                <p class="text-slate-500 text-xs font-bold uppercase">Loading arenas...</p>
            </div>
        </div>
    </main>

    <!-- Detail View -->
    <main id="detail-view" class="max-w-4xl mx-auto hidden animate-slide-up pb-20">
        <div class="p-5 bg-[#0a0f18] border-b border-slate-800 sticky top-14 z-40 backdrop-blur-md">
            <div class="flex justify-between items-start flex-wrap gap-3">
                <button onclick="showDashboard()" class="flex items-center gap-1 text-emerald-400 text-[9px] font-black uppercase hover:gap-2 transition-all">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Exit Arena
                </button>
                <button id="room-password-status" class="text-[9px] bg-slate-800 px-3 py-1 rounded-full font-mono"></button>
                <button onclick="resetCurrentTournament()" class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition">Reset Matches</button>
            </div>
            <div class="mt-3 flex flex-wrap justify-between items-end gap-2">
                <div>
                    <h2 id="active-title" class="text-2xl sm:text-3xl font-black uppercase tracking-tight">Tournament</h2>
                    <p id="active-format" class="text-slate-500 text-[9px] font-bold uppercase">FORMAT</p>
                </div>
                <div class="flex gap-2">
                    <div id="live-badge" class="flex items-center gap-1 bg-emerald-500/20 px-3 py-1.5 rounded-full text-[9px] font-black text-emerald-400 border border-emerald-500/30">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> LIVE
                    </div>
                    <div class="bg-slate-800 px-3 py-1.5 rounded-full text-[9px] font-mono"><i data-lucide="users" class="w-3 h-3 inline mr-1"></i><span id="online-badge">1</span> viewer(s)</div>
                </div>
            </div>
        </div>

        <!-- Tab navigation -->
        <div class="flex bg-slate-900/40 border-b border-slate-800 sticky top-[138px] z-40 backdrop-blur-md overflow-x-auto no-scrollbar" id="tab-bar">
            <button onclick="switchTab('teams')" data-tab="teams" class="flex-1 min-w-[90px] py-4 text-[9px] font-black uppercase tracking-widest transition-all text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5">Teams</button>
            <button onclick="switchTab('matches')" data-tab="matches" class="flex-1 min-w-[90px] py-4 text-[9px] font-black uppercase tracking-widest text-slate-500">Matches</button>
            <button onclick="switchTab('standings')" data-tab="standings" class="flex-1 min-w-[90px] py-4 text-[9px] font-black uppercase tracking-widest text-slate-500">Standings</button>
        </div>
        <div id="tab-content" class="p-5"></div>
    </main>

    <!-- FAB to create room -->
    <button id="fab" onclick="openCreateModal()" class="fixed bottom-6 right-6 bg-emerald-500 text-slate-950 p-4 rounded-2xl shadow-2xl shadow-emerald-500/40 z-[70] border-4 border-[#0a0f18] active:scale-90 transition-transform">
        <i data-lucide="plus" class="w-7 h-7" stroke-width="2.5"></i>
    </button>

    <!-- Create Tournament Modal -->
    <div id="create-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-5 bg-black/80 backdrop-blur-sm modal-transition">
        <div class="bg-slate-900 w-full max-w-md rounded-3xl p-6 border border-slate-700 shadow-2xl animate-slide-up">
            <h3 class="text-2xl font-black mb-5 italic uppercase">⚔️ Forge Arena</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400">Arena Name</label>
                    <input id="new-name" placeholder="e.g., Cyber Colosseum" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 text-sm mt-1 outline-none">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400">Format</label>
                    <select id="new-format" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 text-sm">
                        <option value="Groups + Knockout">Groups + Knockout</option>
                        <option value="League Table (1 Leg)">League (1 Leg)</option>
                        <option value="League Table (2 Legs)">League (2 Legs)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-400 flex items-center gap-2"><i data-lucide="lock" class="w-3 h-3"></i> Password (optional)</label>
                    <input id="new-password" type="text" placeholder="Leave empty for PUBLIC room" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 text-sm">
                    <p class="text-[9px] text-slate-500 mt-1">🔓 No password = public room | 🔒 With password = private room</p>
                </div>
                <div class="flex gap-3 pt-3">
                    <button onclick="closeCreateModal()" class="flex-1 p-3 rounded-xl font-black text-[9px] uppercase border border-slate-700">Cancel</button>
                    <button onclick="createTournament()" class="flex-1 bg-emerald-500 text-slate-950 p-3 rounded-xl font-black text-[9px] uppercase shadow-lg">Create Arena</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Unlock Modal -->
    <div id="password-modal" class="fixed inset-0 z-[110] hidden items-center justify-center bg-black/90 backdrop-blur-sm">
        <div class="bg-slate-900 max-w-sm w-full p-6 rounded-3xl border border-slate-700">
            <h3 class="text-xl font-black flex gap-2 items-center"><i data-lucide="key"></i> Private Arena</h3>
            <p class="text-slate-400 text-xs my-3">This room requires a password.</p>
            <input id="password-input" type="password" placeholder="Enter room password" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-700 mb-4">
            <div class="flex gap-3">
                <button onclick="closePasswordModal()" class="flex-1 p-2 border border-slate-700 rounded-xl text-xs">Cancel</button>
                <button onclick="verifyAndJoin()" class="flex-1 bg-emerald-500 text-slate-950 p-2 rounded-xl text-xs font-black">Unlock & Join</button>
            </div>
        </div>
    </div>

    <script>
        // GLOBAL STATE
        let currentRoomId = null;
        let currentRoomRef = null;
        let currentRoomPassword = null;
        let localTournamentCache = null;
        let pendingJoinId = null;
        let currentTab = 'teams';

        // Helper: fetch all rooms from Firebase
        function fetchAllRooms() {
            const roomsRef = firebase.database().ref('tournaments');
            roomsRef.once('value', (snap) => {
                const data = snap.val() || {};
                const roomsList = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                renderTournamentList(roomsList);
            }).catch(err => {
                console.error("Error fetching rooms:", err);
                document.getElementById('tournament-list').innerHTML = `<div class="py-16 text-center border-2 border-dashed border-red-800 rounded-2xl"><p class="text-red-500 text-xs font-bold">⚠️ Database connection error. Check Firebase rules.</p><p class="text-slate-400 text-[9px] mt-2">Error: ${err.message}</p></div>`;
                showToast("Firebase error: " + err.message, "error");
            });
        }

        function renderTournamentList(rooms) {
            const container = document.getElementById('tournament-list');
            if (!rooms.length) {
                container.innerHTML = `<div class="py-20 text-center border-2 border-dashed border-slate-800 rounded-2xl"><p class="text-slate-500 text-xs font-bold uppercase">No arenas — create one</p></div>`;
                document.getElementById('room-count-badge').innerText = '0';
                return;
            }
            document.getElementById('room-count-badge').innerText = rooms.length;
            container.innerHTML = '';
            rooms.slice().reverse().forEach(room => {
                const isPrivate = !!room.password && room.password !== '';
                const card = document.createElement('div');
                card.className = "group bg-slate-900/60 border border-slate-800 p-4 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-slate-800 transition-all";
                card.onclick = () => attemptEnterRoom(room.id, room.password);
                card.innerHTML = `
                    <div class="flex gap-3 items-center">
                        <div class="w-11 h-11 rounded-xl bg-emerald-500/10 flex items-center justify-center">
                            <i data-lucide="${isPrivate ? 'lock' : 'globe'}" class="w-5 h-5 ${isPrivate ? 'text-amber-400' : 'text-emerald-400'}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold group-hover:text-emerald-400">${escapeHtml(room.name)}</h4>
                            <div class="flex flex-wrap gap-2 text-[9px] font-bold uppercase">
                                <span class="text-emerald-400/80">${room.format || 'League'}</span>
                                <span class="text-slate-600">•</span>
                                <span>${room.teams?.length || 0} teams</span>
                                <span class="${isPrivate ? 'text-amber-500' : 'text-emerald-500'}">${isPrivate ? '🔒 Private' : '🌍 Public'}</span>
                            </div>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-500 group-hover:text-emerald-400"></i>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function attemptEnterRoom(roomId, roomPassword) {
            if (roomPassword && roomPassword !== '') {
                pendingJoinId = roomId;
                document.getElementById('password-modal').classList.remove('hidden');
                document.getElementById('password-modal').classList.add('flex');
                document.getElementById('password-input').value = '';
                currentRoomPassword = roomPassword;
            } else {
                joinRoomDirect(roomId);
            }
        }

        function verifyAndJoin() {
            const entered = document.getElementById('password-input').value;
            if (entered === currentRoomPassword) {
                closePasswordModal();
                joinRoomDirect(pendingJoinId);
            } else {
                alert("❌ Incorrect password. Access denied.");
            }
        }

        function closePasswordModal() {
            document.getElementById('password-modal').classList.add('hidden');
            document.getElementById('password-modal').classList.remove('flex');
            pendingJoinId = null;
        }

        function joinRoomDirect(roomId) {
            if (currentRoomRef) currentRoomRef.off();
            currentRoomId = roomId;
            currentRoomRef = firebase.database().ref(`tournaments/${roomId}`);
            
            currentRoomRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) { 
                    alert("Room vanished or deleted"); 
                    showDashboard(); 
                    return; 
                }
                localTournamentCache = { id: roomId, ...data };
                if (document.getElementById('detail-view') && !document.getElementById('detail-view').classList.contains('hidden')) {
                    refreshDetailUI();
                }
            }, (error) => {
                console.error("Realtime error:", error);
                alert("Connection error. Check Firebase rules are set to read/write true.");
            });
            
            showDetailUI();
        }

        function refreshDetailUI() {
            if (!localTournamentCache) return;
            document.getElementById('active-title').innerText = localTournamentCache.name || "Arena";
            document.getElementById('active-format').innerText = localTournamentCache.format || "Unknown";
            const hasPass = localTournamentCache.password && localTournamentCache.password !== '';
            document.getElementById('room-password-status').innerHTML = hasPass ? `<i data-lucide="lock" class="w-3 h-3 inline mr-1"></i> PRIVATE` : `<i data-lucide="globe" class="w-3 h-3 inline mr-1"></i> PUBLIC`;
            lucide.createIcons();
            renderTabContentLocal();
        }

        function showDetailUI() {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('fab').classList.add('hidden');
            refreshDetailUI();
        }

        function showDashboard() {
            if (currentRoomRef) { 
                currentRoomRef.off(); 
                currentRoomRef = null; 
            }
            currentRoomId = null;
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('fab').classList.remove('hidden');
            fetchAllRooms();
        }

        function switchTab(tab) {
            currentTab = tab;
            const buttons = document.querySelectorAll('#tab-bar button');
            buttons.forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.className = "flex-1 min-w-[90px] py-4 text-[9px] font-black uppercase tracking-widest text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5";
                } else {
                    btn.className = "flex-1 min-w-[90px] py-4 text-[9px] font-black uppercase tracking-widest text-slate-500";
                }
            });
            renderTabContentLocal();
        }

        function renderTabContentLocal() {
            const t = localTournamentCache;
            if (!t) return;
            const container = document.getElementById('tab-content');
            
            if (currentTab === 'teams') {
                const teamsList = t.teams || [];
                container.innerHTML = `
                    <div class="space-y-5">
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-3">
                            <div class="flex gap-2 flex-wrap">
                                <input id="new-team-name" placeholder="Team name" class="flex-1 bg-slate-950 p-3 rounded-xl border border-slate-700 text-sm">
                                <button onclick="addTeamGlobal()" class="bg-emerald-500 text-slate-950 px-5 py-3 rounded-xl font-black text-[10px] uppercase">Add Team</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${teamsList.map(team => `
                                <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex justify-between items-center">
                                    <div class="flex gap-2 items-center"><div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-[10px] font-black text-emerald-400">${escapeHtml(team.name.slice(0,2))}</div><span class="font-bold text-sm">${escapeHtml(team.name)}</span></div>
                                    <button onclick="removeTeamGlobal('${team.id}')" class="text-slate-500 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            `).join('')}
                            ${teamsList.length === 0 ? '<div class="col-span-full text-center text-slate-500 py-8 text-xs">No teams enrolled</div>' : ''}
                        </div>
                    </div>
                `;
            }
            else if (currentTab === 'matches') {
                const matches = t.matches || [];
                if (matches.length === 0) {
                    container.innerHTML = `<div class="text-center py-8"><button onclick="generateStageGlobal()" class="bg-emerald-500 text-slate-950 w-full py-5 rounded-2xl font-black text-xs uppercase shadow-xl">🔥 Initialize Brackets / Generate Fixtures</button></div>`;
                } else {
                    container.innerHTML = `<div class="grid gap-4">${matches.map((m, idx) => `
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
                            <div class="flex justify-between text-[9px] font-black uppercase text-slate-400 mb-3"><span>Match ${idx+1}</span><span class="text-emerald-400">${m.stage || 'League'} ${m.grp ? `• Grp ${m.grp}` : ''}</span></div>
                            <div class="flex items-center justify-between gap-3">
                                <div class="flex-1 text-center space-y-2"><p class="text-xs font-black truncate">${escapeHtml(m.t1)}</p><input type="number" id="score1_${idx}" value="${m.s1 ?? ''}" onchange="updateMatchScore(${idx}, 's1', this.value)" class="w-full bg-slate-950 border border-slate-700 p-2 rounded-xl text-center font-black text-lg"></div>
                                <div class="text-slate-600 text-xs font-black">VS</div>
                                <div class="flex-1 text-center space-y-2"><p class="text-xs font-black truncate">${escapeHtml(m.t2)}</p><input type="number" id="score2_${idx}" value="${m.s2 ?? ''}" onchange="updateMatchScore(${idx}, 's2', this.value)" class="w-full bg-slate-950 border border-slate-700 p-2 rounded-xl text-center font-black text-lg"></div>
                            </div>
                        </div>
                    `).join('')}</div>`;
                }
            }
            else if (currentTab === 'standings') {
                const stats = calculateStatsFromCache();
                container.innerHTML = `<div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl overflow-x-auto"><table class="w-full text-left min-w-[320px]"><thead><tr class="text-[9px] font-black text-slate-400 border-b border-slate-800"><th class="pb-3">Team</th><th class="text-center">P</th><th class="text-center">GD</th><th class="text-center">PTS</th></tr></thead><tbody>${stats.map(([name, s]) => `<tr class="border-b border-slate-800/30"><td class="py-3 font-bold text-sm">${escapeHtml(name)}</td><td class="text-center text-slate-300 text-xs">${s.p}</td><td class="text-center text-slate-300">${s.gd}</td><td class="text-center text-emerald-400 font-black">${s.pts}</td></tr>`).join('')}</tbody></table></div>`;
            }
            lucide.createIcons();
        }

        function calculateStatsFromCache() {
            const t = localTournamentCache;
            const teams = t.teams || [];
            const matches = t.matches || [];
            const statsMap = {};
            teams.forEach(team => statsMap[team.name] = { pts: 0, gd: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 });
            matches.forEach(m => {
                if (statsMap[m.t1] && statsMap[m.t2] && m.s1 !== null && m.s2 !== null && m.s1 !== undefined && m.s2 !== undefined) {
                    statsMap[m.t1].p++; statsMap[m.t2].p++;
                    statsMap[m.t1].gf += m.s1; statsMap[m.t1].ga += m.s2;
                    statsMap[m.t2].gf += m.s2; statsMap[m.t2].ga += m.s1;
                    statsMap[m.t1].gd = statsMap[m.t1].gf - statsMap[m.t1].ga;
                    statsMap[m.t2].gd = statsMap[m.t2].gf - statsMap[m.t2].ga;
                    if (m.s1 > m.s2) { statsMap[m.t1].pts += 3; statsMap[m.t1].w++; statsMap[m.t2].l++; }
                    else if (m.s2 > m.s1) { statsMap[m.t2].pts += 3; statsMap[m.t2].w++; statsMap[m.t1].l++; }
                    else { statsMap[m.t1].pts += 1; statsMap[m.t2].pts += 1; statsMap[m.t1].d++; statsMap[m.t2].d++; }
                }
            });
            return Object.entries(statsMap).sort((a,b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd);
        }

        async function updateTournamentData(updatedFields) {
            if (!currentRoomId) return;
            const ref = firebase.database().ref(`tournaments/${currentRoomId}`);
            await ref.update(updatedFields);
        }

        async function addTeamGlobal() {
            const input = document.getElementById('new-team-name');
            const name = input.value.trim();
            if (!name) return;
            const t = localTournamentCache;
            const exists = (t.teams || []).some(tm => tm.name.toLowerCase() === name.toLowerCase());
            if (exists) return alert("Team already in arena");
            const newTeam = { id: Date.now().toString() + Math.random(), name: name };
            const newTeams = [...(t.teams || []), newTeam];
            await updateTournamentData({ teams: newTeams });
            input.value = '';
        }

        async function removeTeamGlobal(teamId) {
            const t = localTournamentCache;
            const newTeams = (t.teams || []).filter(team => team.id !== teamId);
            await updateTournamentData({ teams: newTeams });
        }

        async function updateMatchScore(matchIdx, side, value) {
            const t = localTournamentCache;
            const matches = [...(t.matches || [])];
            if (!matches[matchIdx]) return;
            let num = value === '' ? null : Number(value);
            if (isNaN(num)) num = null;
            matches[matchIdx][side] = num;
            await updateTournamentData({ matches: matches });
        }

        async function generateStageGlobal() {
            const t = localTournamentCache;
            const teams = t.teams || [];
            if (teams.length < 2) { alert("Need at least 2 teams"); return; }
            const format = t.format;
            const isGrouped = format.includes('Group');
            const legs = format.includes('2 Legs') ? 2 : 1;
            let newMatches = [];
            let groupAssignments = null;

            if (isGrouped && teams.length >= 2) {
                const shuffled = [...teams].sort(()=>Math.random()-0.5);
                const groupCount = Math.min(4, Math.floor(teams.length / 2) || 2);
                const perGroup = Math.ceil(teams.length / groupCount);
                groupAssignments = {};
                for (let g = 1; g <= groupCount && shuffled.length; g++) {
                    const grpTeams = shuffled.splice(0, perGroup);
                    grpTeams.forEach(team => groupAssignments[team.name] = g);
                    for (let i=0; i<grpTeams.length; i++) {
                        for (let j=i+1; j<grpTeams.length; j++) {
                            for (let leg=0; leg<legs; leg++) {
                                newMatches.push({ id: Math.random().toString(36).substr(2,8), t1: grpTeams[i].name, t2: grpTeams[j].name, s1: null, s2: null, stage: 'Group Stage', grp: g });
                            }
                        }
                    }
                }
            } else {
                for (let i=0; i<teams.length; i++) {
                    for (let j=i+1; j<teams.length; j++) {
                        for (let leg=0; leg<legs; leg++) {
                            newMatches.push({ id: Math.random().toString(36).substr(2,8), t1: teams[i].name, t2: teams[j].name, s1: null, s2: null, stage: 'League' });
                        }
                    }
                }
            }
            await updateTournamentData({ matches: newMatches, groupAssignments: groupAssignments || null });
        }

        async function resetCurrentTournament() {
            if (!currentRoomId) return;
            await updateTournamentData({ matches: [], groupAssignments: null });
        }

        async function createTournament() {
            const name = document.getElementById('new-name').value.trim();
            if (!name) {
                alert("Enter arena name");
                return;
            }
            
            const format = document.getElementById('new-format').value;
            const password = document.getElementById('new-password').value.trim();
            const newId = Date.now().toString() + Math.random().toString(36);
            const newRoom = {
                name: name,
                format: format,
                password: password || "",
                teams: [],
                matches: [],
                groupAssignments: null,
                createdAt: Date.now()
            };
            
            try {
                showToast("Creating arena...", "info");
                await firebase.database().ref(`tournaments/${newId}`).set(newRoom);
                showToast("✅ Arena created successfully!", "success");
                closeCreateModal();
                document.getElementById('new-name').value = '';
                document.getElementById('new-password').value = '';
                fetchAllRooms();
            } catch (error) {
                console.error("Create error:", error);
                showToast("❌ Failed to create arena: " + error.message, "error");
                alert("Failed to create arena. Please check:\n1. Firebase Realtime Database is enabled\n2. Database rules are set to test mode\n\nError: " + error.message);
            }
        }

        function clearAllData() {
            if (confirm("⚠️ DELETE ALL ARENAS globally? This cannot be undone.")) {
                firebase.database().ref('tournaments').remove().then(()=>{ 
                    showDashboard();
                    showToast("All arenas deleted", "success");
                });
            }
        }

        function openCreateModal() { 
            document.getElementById('create-modal').classList.remove('hidden'); 
            document.getElementById('create-modal').classList.add('flex'); 
        }
        
        function closeCreateModal() { 
            document.getElementById('create-modal').classList.add('hidden'); 
            document.getElementById('create-modal').classList.remove('flex'); 
            document.getElementById('new-password').value = ''; 
        }
        
        function escapeHtml(str) { 
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m){
                if(m==='&') return '&amp;'; 
                if(m==='<') return '&lt;'; 
                if(m==='>') return '&gt;'; 
                return m;
            }); 
        }

        window.onload = () => {
            fetchAllRooms();
            lucide.createIcons();
            setInterval(()=>{
                if(currentRoomId && document.getElementById('online-badge')) {
                    let viewers = Math.floor(Math.random() * 5) + 1;
                    document.getElementById('online-badge').innerText = viewers;
                }
            }, 4000);
        };
    </script>
