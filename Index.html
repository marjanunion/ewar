<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eWAR | Tournament Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Core and Realtime Database Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // REPLACE THIS WITH YOUR FIREBASE CONFIG
        // ==========================================
    // Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBk1d837ftOEGco6B5bP0iTQwyKLw7VpeU",
  authDomain: "ewar-fa1db.firebaseapp.com",
  databaseURL: "https://ewar-fa1db-default-rtdb.firebaseio.com",
  projectId: "ewar-fa1db",
  storageBucket: "ewar-fa1db.firebasestorage.app",
  messagingSenderId: "287555570705",
  appId: "1:287555570705:web:bfbd53a520cf7fb8daf5b0",
  measurementId: "G-3P3RYNZXL0"
};

// Initialize Firebase
    const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Expose database references globally for our standard UI script script below
        window.firebaseDb = db;
        window.dbRef = ref(db, 'tournaments');
        window.writeDatabase = (data) => set(ref(db, 'tournaments'), data);
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0f18;
            color: #f1f5f9;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #2dd4bf33; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2dd4bf; }
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(51, 65, 85, 0.4);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }

        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #10b981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24 antialiased">

    <nav class="sticky top-0 z-50 glass-card border-b border-slate-800/50 px-5 sm:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" id="dashboard-link">
            <img src="e-war.jpg" alt="eWAR Logo" class="w-10 h-10 rounded-2xl object-cover border border-emerald-500/30">
            <div>
                <h1 class="font-black italic text-xl leading-tight tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">eWAR</h1>
                <p class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase -mt-1">Tournament Arena</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="sync-indicator" class="text-[10px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-1.5 bg-slate-900/80 border border-slate-800 px-3 py-1.5 rounded-full">
                <span id="sync-dot" class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="sync-text">Connecting to Live Server...</span>
            </div>
        </div>
    </nav>

    <!-- Dashboard View -->
    <main id="dashboard-view" class="max-w-2xl mx-auto p-5 sm:p-6 space-y-8 animate-slide-up">
        <section class="relative overflow-hidden bg-slate-900 rounded-[2rem] p-7 sm:p-8 border border-slate-800 shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-3xl font-black mb-2 tracking-tight">Create <span class="text-emerald-400">Arenas.</span></h2>
                <p class="text-slate-400 text-sm max-w-[280px] leading-relaxed">Manage tournaments, track scores, and view standings live.</p>
            </div>
            <div class="absolute top-0 right-0 w-48 h-48 bg-emerald-500/10 blur-[80px] rounded-full -mr-20 -mt-20"></div>
        </section>

        <div class="space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-3 h-3"></i> Active Live Rooms
                </h3>
            </div>
            <div id="tournament-list" class="grid gap-3"></div>
        </div>
    </main>

    <!-- Detail View (Room Details) -->
    <main id="detail-view" class="max-w-4xl mx-auto hidden animate-slide-up">
        <div class="p-6 bg-[#0a0f18] border-b border-slate-800 sticky top-16 z-40">
            <div class="flex justify-between items-center mb-4">
                <button id="back-to-dashboard" class="flex items-center gap-2 text-emerald-400 text-[10px] font-black uppercase hover:gap-3 transition-all">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Return to Dashboard
                </button>
                <div class="flex items-center gap-2">
                    <button id="reset-tournament-btn" class="flex items-center gap-2 bg-slate-800/80 border border-slate-700 text-slate-400 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase hover:bg-red-500/10 hover:text-red-400 transition-all">
                        <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset Scores
                    </button>
                    <button id="delete-arena-btn" class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase hover:bg-red-600 hover:text-white transition-all">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Delete Arena
                    </button>
                </div>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h2 id="active-title" class="text-2xl sm:text-3xl font-black uppercase tracking-tight">Tournament Name</h2>
                    <p id="active-format" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">FORMAT</p>
                </div>
                <div id="role-badge" class="flex items-center gap-1.5 bg-emerald-500 px-4 py-1.5 rounded-full text-slate-950 text-[10px] font-black uppercase">
                    <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin Control
                </div>
            </div>
        </div>

        <div class="flex bg-slate-900/50 border-b border-slate-800 sticky top-[168px] z-40 overflow-x-auto no-scrollbar" id="tab-bar"></div>
        <div id="tab-content" class="p-5 sm:p-6"></div>
    </main>

    <!-- Floating Action Button -->
    <button id="fab" class="fixed bottom-8 right-8 bg-emerald-500 text-slate-950 p-5 rounded-[2rem] shadow-2xl shadow-emerald-500/40 z-[70] border-4 border-[#0a0f18] active:scale-90 transition-transform hover:bg-emerald-400 hover:scale-105">
        <i data-lucide="plus" class="w-8 h-8" stroke-width="3"></i>
    </button>

    <!-- Create Tournament Modal -->
    <div id="create-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-sm rounded-[3rem] p-8 sm:p-10 border border-slate-800 shadow-2xl">
            <div class="flex justify-center mb-6">
                <img src="e-war.jpg" alt="eWAR Logo" class="w-16 h-16 rounded-2xl object-cover border-2 border-emerald-500 shadow-lg">
            </div>
            <h3 class="text-2xl sm:text-3xl font-black mb-8 tracking-tighter italic uppercase text-center">Forge Arena</h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Arena Name</label>
                    <input id="arena-name" placeholder="Pro League Season 1..." class="w-full p-4 sm:p-5 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Tournament Format</label>
                    <select id="arena-format" class="w-full p-4 sm:p-5 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none font-bold">
                        <option value="Groups + Knockout">Groups + Knockout</option>
                        <option value="League Table (1 Leg)">League (1 Leg)</option>
                        <option value="League Table (2 Legs)">League (2 Legs)</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Access PIN (Optional)</label>
                    <input id="arena-pin" type="password" placeholder="••••" class="w-full p-4 sm:p-5 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none">
                </div>
                <div class="flex gap-3 pt-4">
                    <button id="close-modal-btn" class="flex-1 p-4 rounded-2xl font-black text-[10px] uppercase border border-slate-800">Cancel</button>
                    <button id="create-tournament-btn" class="flex-1 bg-emerald-500 text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-transform">Create Arena</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PIN Prompt Modal -->
    <div id="pin-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-xs rounded-[3rem] p-10 border border-slate-800 text-center">
            <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="w-8 h-8 text-amber-500"></i>
            </div>
            <h3 class="font-black text-xl mb-6 tracking-tight uppercase italic text-amber-500">Protected Entry</h3>
            <input id="entered-pin" type="password" placeholder="PIN CODE" class="w-full p-5 rounded-[2rem] bg-slate-950 border border-slate-800 text-center text-xl tracking-[0.3em] mb-8 outline-none">
            <div class="flex gap-3">
                <button id="cancel-pin-btn" class="flex-1 p-4 rounded-2xl border border-slate-800 font-black text-[10px] uppercase">Cancel</button>
                <button id="unlock-room-btn" class="flex-1 bg-amber-500 text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase">Unlock</button>
            </div>
        </div>
    </div>

    <script>
        // ---------- DATA SYSTEM ----------
        let tournaments = [];
        let activeTournamentId = null;
        let targetedLockedId = null;
        let currentTab = 'teams';
        let isReadOnlyMode = false;

        // Utilities
        function generateUUID() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function refreshIcons() {
            if (window.lucide) setTimeout(() => window.lucide.createIcons(), 10);
        }

        // ---------- REALTIME SYNC HANDLERS ----------
        function syncWithFirebase() {
            if (!window.dbRef) {
                // Retry in case module timing window is delayed slightly
                setTimeout(syncWithFirebase, 100);
                return;
            }

            // Bind real-time data streaming updates from server
            import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js").then((mod) => {
                mod.onValue(window.dbRef, (snapshot) => {
                    const data = snapshot.val();
                    tournaments = data ? Object.values(data) : [];
                    
                    // Update status layout info
                    const dot = document.getElementById('sync-dot');
                    const label = document.getElementById('sync-text');
                    if(dot && label) {
                        dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                        label.innerText = "Live Synchronized Grid Connected";
                    }

                    // Trigger non-breaking dynamic component redraw updates across interfaces
                    renderTournamentList();
                    if (activeTournamentId) {
                        // Refresh state variable pointers inside viewing window bounds safely
                        const currentActiveT = tournaments.find(x => x.id === activeTournamentId);
                        if (!currentActiveT) {
                            showDashboard();
                        } else {
                            renderTabsNav();
                            renderTabContent();
                        }
                    }
                });
            });
        }

        function pushUpdateData() {
            if (window.writeDatabase) {
                // Convert arrays directly to object structures seamlessly for firebase nodes matching schema keys
                const syncData = {};
                tournaments.forEach(t => { syncData[t.id] = t; });
                window.writeDatabase(syncData);
            }
        }

        // ---------- TOURNAMENT BRACKET GENERATOR ----------
        function generateStage() {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            
            const isGrouped = t.format && t.format.includes('Group');
            const teamList = t.teams || [];
            
            if (teamList.length < 2) {
                alert("Need at least 2 teams to generate matches.");
                return;
            }
            
            if (isGrouped && teamList.length < 4) {
                alert("Groups require at least 4 teams.");
                return;
            }

            const matches = [];
            const teams = [...teamList].sort(() => Math.random() - 0.5);
            const legs = t.format && t.format.includes('2 Legs') ? 2 : 1;
            const groupAssignments = {};

            if (isGrouped) {
                let remaining = [...teams];
                let groupIdx = 0;
                let groupCount = Math.min(Math.floor(teamList.length / 3), 4);
                if (groupCount < 2) groupCount = 2;
                if (teamList.length === 6) groupCount = 2;
                const teamsPerGroup = Math.ceil(teamList.length / groupCount);

                while (remaining.length > 0 && groupIdx < groupCount) {
                    groupIdx++;
                    const group = remaining.splice(0, Math.min(teamsPerGroup, remaining.length));
                    group.forEach(team => groupAssignments[team.name] = groupIdx);

                    for (let i = 0; i < group.length; i++) {
                        for (let j = i + 1; j < group.length; j++) {
                            for (let l = 0; l < legs; l++) {
                                matches.push({
                                    id: generateUUID(),
                                    t1: group[i].name, 
                                    t2: group[j].name,
                                    s1: "", 
                                    s2: "", 
                                    stage: 'Group Stage', 
                                    grp: groupIdx
                                });
                            }
                        }
                    }
                }
                t.groupAssignments = groupAssignments;
            } else {
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        for (let l = 0; l < legs; l++) {
                            matches.push({
                                id: generateUUID(),
                                t1: teams[i].name, 
                                t2: teams[j].name,
                                s1: "", 
                                s2: "", 
                                stage: 'League'
                            });
                        }
                    }
                }
            }

            t.matches = matches;
            pushUpdateData();
            switchTab('matches');
        }

        function calculateStats(teams, matches, filterGroup = null, groupAssignments = null) {
            const statsMap = {};
            const relevantTeams = filterGroup 
                ? (teams || []).filter(t => groupAssignments && groupAssignments[t.name] === filterGroup)
                : (teams || []);

            relevantTeams.forEach(t => {
                statsMap[t.name] = { pts: 0, gd: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };
            });
            
            (matches || []).forEach(m => {
                if (statsMap[m.t1] && statsMap[m.t2] && m.s1 !== "" && m.s2 !== "" && m.s1 !== null && m.s2 !== null) {
                    const s1 = Number(m.s1), s2 = Number(m.s2);
                    statsMap[m.t1].p++; statsMap[m.t2].p++;
                    statsMap[m.t1].gf += s1; statsMap[m.t1].ga += s2;
                    statsMap[m.t2].gf += s2; statsMap[m.t2].ga += s1;

                    if (s1 > s2) {
                        statsMap[m.t1].w++; statsMap[m.t1].pts += 3;
                        statsMap[m.t2].l++;
                    } else if (s1 < s2) {
                        statsMap[m.t2].w++; statsMap[m.t2].pts += 3;
                        statsMap[m.t1].l++;
                    } else {
                        statsMap[m.t1].d++; statsMap[m.t1].pts += 1;
                        statsMap[m.t2].d++; statsMap[m.t2].pts += 1;
                    }
                    
                    statsMap[m.t1].gd = statsMap[m.t1].gf - statsMap[m.t1].ga;
                    statsMap[m.t2].gd = statsMap[m.t2].gf - statsMap[m.t2].ga;
                }
            });
            
            return Object.entries(statsMap).sort((a, b) => {
                if (b[1].pts !== a[1].pts) return b[1].pts - a[1].pts;
                if (b[1].gd !== a[1].gd) return b[1].gd - a[1].gd;
                return b[1].gf - a[1].gf;
            });
        }

        // ---------- VIEWS PRESENTATION ENGINE ----------
        function renderTournamentList() {
            const list = document.getElementById('tournament-list');
            if (!list) return;
            list.innerHTML = '';
            
            if (tournaments.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center border-2 border-dashed border-slate-800 rounded-[2rem]">
                        <i data-lucide="shield-alert" class="w-8 h-8 text-slate-700 mx-auto mb-3"></i>
                        <p class="text-slate-600 text-xs font-black uppercase tracking-widest">No Arenas Online</p>
                        <p class="text-slate-700 text-[10px] mt-2">Click the + button to launch your room connection</p>
                    </div>
                `;
                refreshIcons();
                return;
            }

            tournaments.forEach(t => {
                const isLocked = t.password && t.password.trim() !== '';
                const card = document.createElement('div');
                card.className = "group bg-slate-900/50 border border-slate-800/80 p-5 rounded-3xl flex justify-between items-center hover:border-slate-700 transition-all";
                
                card.innerHTML = `
                    <div class="flex gap-4 items-center flex-1 cursor-pointer" id="edit-trigger-${t.id}">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${isLocked ? 'bg-amber-500/10' : 'bg-blue-500/10'} border border-slate-800">
                            <i data-lucide="${isLocked ? 'lock' : 'users'}" class="w-5 h-5 ${isLocked ? 'text-amber-500' : 'text-blue-500'}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-base group-hover:text-emerald-400 transition-colors">${escapeHtml(t.name)}</h4>
                            <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                                <span class="text-emerald-500/70">${escapeHtml(t.format)}</span>
                                <span>•</span>
                                <span>${t.teams ? Object.keys(t.teams).length : 0} Teams</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="view-trigger-${t.id}" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 border border-slate-700 text-slate-300 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all flex items-center gap-1.5 shadow-lg">
                            <i data-lucide="eye" class="w-3.5 h-3.5"></i> View
                        </button>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-700 group-hover:text-emerald-500 transition-colors"></i>
                    </div>
                `;
                list.appendChild(card);

                document.getElementById(`edit-trigger-${t.id}`).onclick = () => attemptJoinDetail(t.id, false);
                document.getElementById(`view-trigger-${t.id}`).onclick = (e) => {
                    e.stopPropagation();
                    attemptJoinDetail(t.id, true);
                };
            });
            refreshIcons();
        }

        function renderTabsNav() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const isGroupedT = t.format && t.format.includes('Group');
            const hasGroupsGenerated = t.groupAssignments && Object.keys(t.groupAssignments).length > 0;
            const bar = document.getElementById('tab-bar');
            if (!bar) return;
            
            const tabs = ['teams'];
            if (isGroupedT && hasGroupsGenerated) tabs.push('groups');
            tabs.push('matches', 'standings');

            bar.innerHTML = tabs.map(tab => {
                const isActive = currentTab === tab;
                return `
                    <button onclick="switchTab('${tab}')" class="flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all ${isActive ? 'text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5' : 'text-slate-500'}">
                        ${tab.charAt(0).toUpperCase() + tab.slice(1)}
                    </button>
                `;
            }).join('');
            refreshIcons();
        }

        function renderTabContent() {
            const container = document.getElementById('tab-content');
            if (!container) return;
            
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const isGroupedT = t.format && t.format.includes('Group');
            container.innerHTML = '';

            if (currentTab === 'teams') {
                const teamsArr = t.teams ? Object.values(t.teams) : [];
                const enrolledHtml = teamsArr.map(team => `
                    <div class="bg-slate-900/40 border border-slate-800/60 p-5 rounded-3xl flex justify-between items-center group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-emerald-500">
                                ${escapeHtml(team.name.slice(0, 2).toUpperCase())}
                            </div>
                            <p class="font-bold text-base">${escapeHtml(team.name)}</p>
                        </div>
                        ${((!t.matches || t.matches.length === 0) && !isReadOnlyMode) ? `<button onclick="removeTeam('${team.id}')" class="p-2 text-slate-600 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="space-y-6">
                        ${((!t.matches || t.matches.length === 0) && !isReadOnlyMode) ? `
                            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] space-y-5">
                                <div class="flex items-center gap-2 mb-2">
                                    <i data-lucide="plus" class="w-4 h-4 text-emerald-500"></i>
                                    <h3 class="text-xs font-black uppercase text-slate-400">Enroll Team</h3>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <input id="team-input" placeholder="Enter team name..." class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none" />
                                    <button id="add-team-btn" class="bg-emerald-500 text-slate-950 px-8 py-4 rounded-2xl font-black text-[11px] uppercase transition-transform active:scale-95">Add Team</button>
                                </div>
                            </div>
                        ` : ''}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${enrolledHtml || '<p class="col-span-full py-12 text-center text-slate-600 text-xs font-bold uppercase">No teams enrolled</p>'}
                        </div>
                    </div>
                `;

                const addBtn = document.getElementById('add-team-btn');
                const teamInput = document.getElementById('team-input');
                if (addBtn && teamInput) {
                    addBtn.onclick = () => {
                        if (teamInput.value.trim()) addTeam(teamInput.value.trim());
                        teamInput.value = '';
                    };
                }
            }

            if (currentTab === 'groups' && isGroupedT && t.groupAssignments) {
                const groupedMap = {};
                const teamsArr = t.teams ? Object.values(t.teams) : [];
                teamsArr.forEach(team => {
                    const gId = t.groupAssignments[team.name] || 'Unassigned';
                    if (!groupedMap[gId]) groupedMap[gId] = [];
                    groupedMap[gId].push(team);
                });

                container.innerHTML = Object.entries(groupedMap).sort(([a], [b]) => String(a).localeCompare(String(b))).map(([gId, gTeams]) => `
                    <div class="bg-slate-900/30 border border-slate-800 p-6 rounded-[2.5rem] mb-4">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-8 h-8 bg-emerald-500/10 rounded-lg flex items-center justify-center border border-emerald-500/20">
                                <i data-lucide="layers" class="w-4 h-4 text-emerald-500"></i>
                            </div>
                            <h3 class="text-sm font-black uppercase tracking-widest">Group ${gId}</h3>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            ${gTeams.map(gt => `
                                <div class="bg-slate-950/50 p-4 rounded-2xl flex items-center gap-3 border border-slate-800/50">
                                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                                    <span class="font-bold text-sm">${escapeHtml(gt.name)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            if (currentTab === 'matches') {
                const matchesArr = t.matches ? Object.values(t.matches) : [];
                if (matchesArr.length === 0) {
                    container.innerHTML = `
                        <div class="text-center space-y-4 py-8">
                            ${!isReadOnlyMode ? `
                                <button onclick="generateStage()" class="w-full bg-emerald-500 text-slate-950 py-6 rounded-[2.5rem] font-black text-[12px] uppercase shadow-2xl shadow-emerald-500/20 active:scale-[0.98] transition-all">
                                    Initialize Brackets
                                </button>
                            ` : `
                                <p class="text-slate-600 text-xs font-black uppercase tracking-widest">Brackets have not been initialized yet.</p>
                            `}
                        </div>
                    `;
                } else {
                    container.innerHTML = `<div class="grid gap-4">${matchesArr.map((m, idx) => `
                        <div class="bg-slate-900 border border-slate-800/50 p-6 sm:p-8 rounded-[2.5rem]">
                            <div class="flex justify-between items-center mb-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <span>Match ${idx + 1}</span>
                                <span class="text-emerald-500">${m.stage || 'League'} ${m.grp ? `• GROUP ${m.grp}` : ''}</span>
                            </div>
                            <div class="flex items-center justify-between gap-4">
                                <div class="flex-1 text-center space-y-3">
                                    <p class="text-xs font-black truncate">${escapeHtml(m.t1)}</p>
                                    <input type="number" placeholder="-" value="${m.s1 !== undefined ? m.s1 : ''}" data-match-id="${m.id}" data-team="1" ${isReadOnlyMode ? 'disabled' : ''} class="match-score-input w-full bg-slate-950 border border-slate-800 disabled:opacity-60 disabled:cursor-not-allowed p-3 rounded-2xl text-center font-black text-xl outline-none transition-all" />
                                </div>
                                <div class="text-slate-800 font-black text-[10px] pt-8">VS</div>
                                <div class="flex-1 text-center space-y-3">
                                    <p class="text-xs font-black truncate">${escapeHtml(m.t2)}</p>
                                    <input type="number" placeholder="-" value="${m.s2 !== undefined ? m.s2 : ''}" data-match-id="${m.id}" data-team="2" ${isReadOnlyMode ? 'disabled' : ''} class="match-score-input w-full bg-slate-950 border border-slate-800 disabled:opacity-60 disabled:cursor-not-allowed p-3 rounded-2xl text-center font-black text-xl outline-none transition-all" />
                                </div>
                            </div>
                        </div>
                    `).join('')}</div>`;
                    
                    document.querySelectorAll('.match-score-input').forEach(input => {
                        input.addEventListener('input', handleScoreChange);
                    });
                }
            }
            
            if (currentTab === 'standings') {
                const matchesArr = t.matches ? Object.values(t.matches) : [];
                const teamsArr = t.teams ? Object.values(t.teams) : [];

                if (matchesArr.length === 0) {
                    container.innerHTML = `<div class="py-12 text-center text-slate-600"><p class="text-[10px] font-black uppercase">Standings will appear after bracket generation.</p></div>`;
                } else {
                    const groupIds = t.groupAssignments ? Array.from(new Set(Object.values(t.groupAssignments))).sort((a,b)=>String(a).localeCompare(String(b))) : [null];
                    
                    container.innerHTML = groupIds.map(gid => {
                        const stats = calculateStats(teamsArr, matchesArr, gid, t.groupAssignments);
                        return `
                            <div class="mb-10">
                                ${gid ? `<h3 class="text-xs font-black uppercase text-emerald-500 tracking-widest mb-4 ml-4">Group ${gid}</h3>` : ''}
                                <div class="bg-slate-900 border border-slate-800 p-5 rounded-[2.5rem] shadow-xl overflow-x-auto">
                                    <table class="w-full text-left min-w-[450px]">
                                        <thead><tr class="text-[9px] font-black text-slate-500 uppercase border-b border-slate-800">
                                            <th class="pb-4">Team</th><th class="pb-4 text-center">P</th><th class="pb-4 text-center">W</th>
                                            <th class="pb-4 text-center">D</th><th class="pb-4 text-center">L</th><th class="pb-4 text-center">GD</th><th class="pb-4 text-center">PTS</th>
                                        </tr></thead>
                                        <tbody>${stats.map(([name, s]) => `<tr class="border-b border-slate-800/30">
                                            <td class="py-4 font-bold text-sm">${escapeHtml(name)}</td>
                                            <td class="py-4 text-center text-slate-400 text-sm font-medium">${s.p}</td>
                                            <td class="py-4 text-center text-slate-400 text-sm font-medium">${s.w}</td>
                                            <td class="py-4 text-center text-slate-400 text-sm font-medium">${s.d}</td>
                                            <td class="py-4 text-center text-slate-400 text-sm font-medium">${s.l}</td>
                                            <td class="py-4 text-center text-slate-400 text-sm font-medium">${s.gd >= 0 ? '+' + s.gd : s.gd}</td>
                                            <td class="py-4 text-center text-emerald-400 font-black text-sm">${s.pts}</td>
                                        </tr>`).join('')}</tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }
            refreshIcons();
        }

        function handleScoreChange(e) {
            const input = e.target;
            const matchId = input.getAttribute('data-match-id');
            const teamNum = input.getAttribute('data-team');
            const val = input.value === '' ? "" : parseInt(input.value);
            
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || !t.matches) return;
            
            // Find within array or indexed object variants cleanly
            const match = Object.values(t.matches).find(m => m.id === matchId);
            if (!match) return;

            if (teamNum === '1') match.s1 = val;
            else match.s2 = val;

            // Push individual updates out to database without breaking standard active focus
            pushUpdateData();
        }

        // ---------- NAVIGATION & ACCESS GATEWAYS ----------
        function switchTab(tab) {
            currentTab = tab;
            renderTabsNav();
            renderTabContent();
        }

        function attemptJoinDetail(id, readOnlyRequested = false) {
            const t = tournaments.find(x => x.id === id);
            if (!t) return;

            isReadOnlyMode = readOnlyRequested;

            if (isReadOnlyMode) {
                launchRoomView(t);
            } else if (t.password && t.password.trim() !== '') {
                targetedLockedId = id;
                document.getElementById('entered-pin').value = '';
                document.getElementById('pin-modal').classList.remove('hidden');
            } else {
                launchRoomView(t);
            }
        }

        function launchRoomView(tournament) {
            activeTournamentId = tournament.id;
            currentTab = 'teams';
            
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('fab').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');

            document.getElementById('active-title').innerText = tournament.name;
            document.getElementById('active-format').innerText = tournament.format;

            const resetBtn = document.getElementById('reset-tournament-btn');
            const deleteBtn = document.getElementById('delete-arena-btn');
            const badge = document.getElementById('role-badge');
            
            if (isReadOnlyMode) {
                if (resetBtn) resetBtn.classList.add('hidden');
                if (deleteBtn) deleteBtn.classList.add('hidden');
                if (badge) {
                    badge.className = "flex items-center gap-1.5 bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full text-slate-300 text-[10px] font-black uppercase";
                    badge.innerHTML = `<i data-lucide="eye" class="w-3.5 h-3.5 text-cyan-400"></i> Spectator Mode`;
                }
            } else {
                if (resetBtn) resetBtn.classList.remove('hidden');
                if (deleteBtn) deleteBtn.classList.remove('hidden');
                if (badge) {
                    badge.className = "flex items-center gap-1.5 bg-emerald-500 px-4 py-1.5 rounded-full text-slate-950 text-[10px] font-black uppercase";
                    badge.innerHTML = `<i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin Control`;
                }
            }

            renderTabsNav();
            renderTabContent();
        }

        function showDashboard() {
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('fab').classList.remove('hidden');
            
            activeTournamentId = null;
            isReadOnlyMode = false;
            renderTournamentList();
        }

        function addTeam(name) {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            if (!t.teams) t.teams = {};
            
            const newId = generateUUID();
            // Object map assignment ensures seamless real-time patching without indices tracking confusion
            t.teams[newId] = { id: newId, name: name };
            pushUpdateData();
        }

        function removeTeam(teamId) {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || !t.teams) return;
            
            delete t.teams[teamId];
            pushUpdateData();
        }

        // ---------- INITIALIZATION CORE ----------
        document.addEventListener('DOMContentLoaded', () => {
            syncWithFirebase();

            document.getElementById('dashboard-link').onclick = showDashboard;
            document.getElementById('back-to-dashboard').onclick = showDashboard;

            const fab = document.getElementById('fab');
            const createModal = document.getElementById('create-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const createTournamentBtn = document.getElementById('create-tournament-btn');

            fab.onclick = () => createModal.classList.remove('hidden');
            closeModalBtn.onclick = () => createModal.classList.add('hidden');

            createTournamentBtn.onclick = () => {
                const nameInput = document.getElementById('arena-name');
                const formatInput = document.getElementById('arena-format');
                const pinInput = document.getElementById('arena-pin');

                if (!nameInput.value.trim()) {
                    alert('Please provide an Arena label name.');
                    return;
                }

                const id = generateUUID();
                const newRoom = {
                    id: id,
                    name: nameInput.value.trim(),
                    format: formatInput.value,
                    password: pinInput.value,
                    teams: {},
                    matches: {},
                    groupAssignments: {}
                };

                tournaments.push(newRoom);
                pushUpdateData();
                
                nameInput.value = '';
                pinInput.value = '';
                createModal.classList.add('hidden');
            };

            document.getElementById('cancel-pin-btn').onclick = () => {
                document.getElementById('pin-modal').classList.add('hidden');
                targetedLockedId = null;
            };

            document.getElementById('unlock-room-btn').onclick = () => {
                const entered = document.getElementById('entered-pin').value;
                const t = tournaments.find(x => x.id === targetedLockedId);
                if (t && t.password === entered) {
                    document.getElementById('pin-modal').classList.add('hidden');
                    targetedLockedId = null;
                    launchRoomView(t);
                } else {
                    alert('Invalid PIN protection key verification access.');
                }
            };

            document.getElementById('reset-tournament-btn').onclick = () => {
                if (isReadOnlyMode) return;
                if (confirm('Are you absolutely sure you want to completely clear out all matches and score history data?')) {
                    const t = tournaments.find(x => x.id === activeTournamentId);
                    if (t) {
                        t.matches = {};
                        t.groupAssignments = {};
                        pushUpdateData();
                    }
                }
            };

            document.getElementById('delete-arena-btn').onclick = () => {
                if (isReadOnlyMode) return;
                const t = tournaments.find(x => x.id === activeTournamentId);
                if (!t) return;

                if (!confirm(`Are you completely sure you want to permanently delete "${t.name}"? This action cannot be reversed.`)) {
                    return;
                }

                if (t.password && t.password.trim() !== '') {
                    const confirmPin = prompt("Enter this Arena's PIN code to authorize deletion:");
                    if (confirmPin !== t.password) {
                        alert("Incorrect PIN. Deletion cancelled.");
                        return;
                    }
                }

                import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js").then((mod) => {
                    const specificNode = mod.ref(window.firebaseDb, `tournaments/${activeTournamentId}`);
                    mod.set(specificNode, null).then(() => {
                        showDashboard();
                    });
                });
            };
        });
    </script>
</body>
</html>
