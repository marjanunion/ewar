<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eWAR | Tournament Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML2PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2dd4bf33; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2dd4bf; }
        .glass-card {
            backdrop-filter: blur(14px);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #10b981 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        input[type="number"] { -moz-appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24 antialiased bg-slate-50 text-slate-900 dark:bg-[#0a0f18] dark:text-[#f1f5f9] transition-colors duration-300">

    <nav class="sticky top-0 z-50 glass-card bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800/50 px-5 sm:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" id="dashboard-link">
            <div class="w-10 h-10 rounded-2xl border border-emerald-500/30 bg-slate-100 dark:bg-slate-900 flex items-center justify-center font-black italic text-emerald-500 dark:text-emerald-400 text-lg shadow-inner">eW</div>
            <div>
                <h1 class="font-black italic text-xl leading-tight tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-cyan-500 dark:from-emerald-400 dark:to-cyan-400">eWAR</h1>
                <p class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase -mt-1">Tournament Arena</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-slate-400 block dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 text-slate-400 hidden dark:block"></i>
            </button>
            <div id="sync-indicator" class="text-[10px] font-black uppercase text-slate-500 dark:text-slate-400 tracking-widest flex items-center gap-1.5 bg-slate-100 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 px-3 py-1.5 rounded-full">
                <span id="sync-dot" class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                <span id="sync-text">Connecting...</span>

    </nav>

    <!-- Dashboard View -->
    <main id="dashboard-view" class="max-w-3xl mx-auto p-5 sm:p-6 space-y-8 animate-slide-up">
        <section class="relative overflow-hidden bg-white dark:bg-slate-900 rounded-[2rem] p-7 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-xl dark:shadow-2xl">

                <p class="text-slate-500 dark:text-slate-400 text-sm max-w-[280px] leading-relaxed">Manage tournaments, track scores, and view standings live.</p>

        <div class="space-y-4">
            <div class="flex items-center justify-between mb-2">

                    <i data-lucide="layout-dashboard" class="w-3 h-3"></i> Active Live Rooms

            <div id="tournament-list" class="grid gap-4"></div>
        </div>
    </main>

    <!-- Detail View (Room Details) -->
    <main id="detail-view" class="max-w-5xl mx-auto hidden animate-slide-up">
        <div class="p-6 bg-slate-50 dark:bg-[#0a0f18] border-b border-slate-200 dark:border-slate-800 sticky top-16 z-40 transition-colors duration-300">

                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Return to Dashboard
                </button>
                <div class="flex items-center gap-2">
                    <button id="reset-tournament-btn" class="flex items-center gap-2 bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase hover:bg-red-50 dark:hover:bg-red-500/10 hover:text-red-500 transition-all shadow-sm">

    <!-- Floating Action Button -->
    <button id="fab" class="fixed bottom-8 right-8 bg-emerald-500 text-white dark:text-slate-950 p-5 rounded-[2rem] shadow-xl shadow-emerald-500/30 z-[70] border-4 border-slate-50 dark:border-[#0a0f18] active:scale-90 transition-transform hover:bg-emerald-400 hover:scale-105">

    <!-- Create Tournament Modal -->
    <div id="create-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/80 dark:bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[3rem] p-8 sm:p-10 border border-slate-200 dark:border-slate-800 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl sm:text-3xl font-black mb-6 tracking-tighter italic uppercase text-center text-emerald-500 dark:text-emerald-400">Forge Arena</h3>
            <div class="space-y-5">

                        <option value="League Table (2 Legs)">League (2 Legs)</option>
                        <option value="League Table (2 Legs) + Knockout">League (2 Legs) + Knockout</option>

                </div>
                
                <div id="knockout-teams-wrapper" class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Total Teams Advancing to Knockout</label>
                    <select id="arena-ko-count" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm outline-none font-bold text-slate-900 dark:text-white transition-colors">

                    <button id="create-tournament-btn" class="flex-1 bg-emerald-500 text-white dark:text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-transform hover:bg-emerald-400">Create Arena</button>

    <!-- PIN Prompt Modal -->
    <div id="pin-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/80 dark:bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 border border-slate-200 dark:border-slate-800 text-center shadow-2xl">
            <div class="w-16 h-16 bg-amber-100 dark:bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="w-8 h-8 text-amber-500"></i>
            </div>
            <h3 class="font-black text-xl mb-6 tracking-tight uppercase italic text-amber-500">Protected Entry</h3>
            <input id="entered-pin" type="password" placeholder="PIN CODE" class="w-full p-5 rounded-[2rem] bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-center text-xl tracking-[0.3em] mb-8 outline-none text-slate-900 dark:text-white shadow-inner">
            <div class="flex gap-3">
                <button id="cancel-pin-btn" class="flex-1 p-4 rounded-2xl border border-slate-200 dark:border-slate-800 font-black text-[10px] uppercase text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                <button id="unlock-room-btn" class="flex-1 bg-amber-500 text-white dark:text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase hover:bg-amber-400 transition-colors shadow-lg">Unlock</button>
            </div>
        </div>

    <!-- Application Script Engine -->
    <script type="module">
        // Firebase specific imports (Used conditionally)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Application State
        let tournaments = [];
        let activeTournamentId = null;
        let targetedLockedId = null;
        let currentTab = 'teams';
        let isReadOnlyMode = false;
        
        let fbDb = null;
        let fbAppId = 'default-ewar-app';
        let currentUser = null;
        let debounceTimer = null;

        // Stage Constants
        const STAGES = {
            GROUPS: 'Group Stage',
            LEAGUE: 'League',
            R16: 'Round of 16',
            QUARTERS: 'Quarterfinals',
            SEMIS: 'Semifinals',
            FINAL: 'Final',
            THIRD_PLACE: '3rd Place Match',
            KNOCKOUT: 'Knockout'
        };

        // UI Utility functions
        const escapeHtml = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[m]));
        };
        const refreshIcons = () => { if (window.lucide) setTimeout(() => window.lucide.createIcons(), 10); };
        
        // Cryptography for secure IDs & PINs
        const generateUUID = () => crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).substring(2));
        const hashString = async (str) => {
            if (!str) return "";
            const msgUint8 = new TextEncoder().encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };
        
        // Fisher-Yates Shuffle algorithm for unbiased draw
        const fisherYates = (array) => {
            let m = array.length, t, i;
            while (m) {
                i = Math.floor(Math.random() * m--);
                t = array[m]; array[m] = array[i]; array[i] = t;
            }
            return array;
        };

        // ---------- CLOUD STORAGE ENGINE ----------
        async function initStorage() {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const fbConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(fbConfig);
                    const auth = getAuth(app);
                    fbDb = getFirestore(app);
                    fbAppId = typeof __app_id !== 'undefined' ? __app_id : 'ewar-app';

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    currentUser = auth.currentUser;

                    if (!currentUser) return; // Guard
                    
                    const tourneyRef = collection(fbDb, 'artifacts', fbAppId, 'public', 'data', 'tournaments');
                    
                    onSnapshot(tourneyRef, (snapshot) => {
                        tournaments = snapshot.docs.map(d => d.data());
                        
                        document.getElementById('sync-dot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]";
                        document.getElementById('sync-text').innerText = "Live Engine Active";

                        renderTournamentList();
                        
                        if (activeTournamentId) {
                            const currentActiveT = tournaments.find(x => x.id === activeTournamentId);
                            if (!currentActiveT) {
                                showDashboard(); 
                            } else {
                                const activeEl = document.activeElement;
                                const isInputFocused = activeEl && activeEl.tagName === 'INPUT' && activeEl.classList.contains('match-score-input');
                                if (!isInputFocused) {
                                    renderTabsNav(); 
                                    renderTabContent();
                                }
                            }
                        }
                    }, (err) => {
                        console.error("Firebase sync error:", err);
                        document.getElementById('sync-dot').className = "w-1.5 h-1.5 rounded-full bg-red-500";
                        document.getElementById('sync-text').innerText = "Sync Failed";
                    });
                } else {
                    throw new Error("No Firebase config provided by environment.");
                }
            } catch (e) {
                console.warn("Falling back to in-memory state.", e);
                document.getElementById('sync-dot').className = "w-1.5 h-1.5 rounded-full bg-slate-500";
                document.getElementById('sync-text').innerText = "Local Mode";
                renderTournamentList();
            }
        }

        async function pushUpdateData(tournamentObj) {
            if (fbDb && currentUser) {
                try {
                    await setDoc(doc(fbDb, 'artifacts', fbAppId, 'public', 'data', 'tournaments', tournamentObj.id), tournamentObj);
                } catch(e) { console.error("Save error:", e); }
            } else {
                // In-memory update is already applied via object reference, just re-render
                renderTournamentList();
                renderTabContent();
            }
        }

        async function deleteTournamentData(id) {
            if (fbDb && currentUser) {
                try { await deleteDoc(doc(fbDb, 'artifacts', fbAppId, 'public', 'data', 'tournaments', id)); } 
                catch(e) { console.error("Delete error:", e); }
            } else {
                tournaments = tournaments.filter(x => x.id !== id);
                renderTournamentList();
            }
        }

        // ---------- BRACKET GENERATION ENGINE ----------
        window.generateStage = async function() {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            
            const teamList = t.teams ? Object.values(t.teams) : [];
            if (teamList.length < 2) return alert("Need at least 2 teams to generate matches.");

            const matches = [];
            const teams = fisherYates([...teamList]); // Secure shuffle

            if (t.format === "Pure Knockout") {
                const size = parseInt(t.koCount || 4, 10);
                if (teams.length < size) return alert(`Enrolled teams (${teams.length}) is less than the bracket size (${size}).`);
                const bracketTeams = teams.slice(0, size);
                buildKnockoutRound(matches, bracketTeams, size, t.includeLosersFinal);
                t.stage = STAGES.KNOCKOUT;
            } 
            else if (t.format.includes('Groups')) {
                if (teamList.length < 4) return alert("Groups require at least 4 teams.");
                let remaining = [...teams];
                let groupIdx = 0;
                let groupCount = Math.min(Math.floor(teamList.length / 3), 4);
                if (groupCount < 2) groupCount = 2;
                const teamsPerGroup = Math.ceil(teamList.length / groupCount);
                const groupAssignments = {};

                while (remaining.length > 0 && groupIdx < groupCount) {
                    groupIdx++;
                    const group = remaining.splice(0, Math.min(teamsPerGroup, remaining.length));
                    group.forEach(team => groupAssignments[team.name] = groupIdx);

                    for (let i = 0; i < group.length; i++) {
                        for (let j = i + 1; j < group.length; j++) {
                            matches.push({ id: generateUUID(), t1: group[i].name, t2: group[j].name, s1: "", s2: "", stage: STAGES.GROUPS, grp: groupIdx });
                        }
                    }
                }
                t.groupAssignments = groupAssignments;
                t.stage = STAGES.GROUPS;
            } 
            else {
                const legs = t.format.includes('2 Legs') ? 2 : 1;
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        for (let l = 0; l < legs; l++) {
                            matches.push({ id: generateUUID(), t1: teams[i].name, t2: teams[j].name, s1: "", s2: "", stage: STAGES.LEAGUE });
                        }
                    }
                }
                t.stage = STAGES.LEAGUE;
            }

            t.matches = matches;
            await pushUpdateData(t);
            switchTab('matches');
        }

        function buildKnockoutRound(matches, bracketTeams, size, includeLosers) {
            let label = size === 2 ? STAGES.FINAL : size === 4 ? STAGES.SEMIS : size === 8 ? STAGES.QUARTERS : size === 16 ? STAGES.R16 : `Round of ${size}`;
            for (let i = 0; i < size; i += 2) {
                matches.push({
                    id: generateUUID(),
                    t1: bracketTeams[i] ? bracketTeams[i].name || bracketTeams[i] : "TBD",
                    t2: bracketTeams[i+1] ? bracketTeams[i+1].name || bracketTeams[i+1] : "TBD",
                    s1: "", s2: "", p1: "", p2: "", // Include penalty props
                    stage: label, koIndex: i / 2, totalKoSlots: size
                });
            }
            if (size === 4 && includeLosers) {
                matches.push({ id: generateUUID(), t1: "TBD", t2: "TBD", s1: "", s2: "", p1: "", p2: "", stage: STAGES.THIRD_PLACE, koIndex: 99, totalKoSlots: 4 });
            }
        }

        // ---------- AUTO-ADVANCE EVALUATOR ENGINE ----------
        function evaluateAndAdvanceKnockout(t) {
            if (isReadOnlyMode || !t || !t.matches || t.matches.length === 0 || t.format === "League Table (1 Leg)" || t.format === "League Table (2 Legs)") return;

            const matchesArr = Object.values(t.matches);
            const size = parseInt(t.koCount || 4, 10);
            
            // Phase 1: Qualification from Groups/League Table
            if (t.stage === STAGES.GROUPS || t.stage === STAGES.LEAGUE) {
                const allFinished = matchesArr.every(m => m.stage === STAGES.GROUPS || m.stage === STAGES.LEAGUE ? (m.s1 !== "" && m.s2 !== "") : true);
                if (!allFinished) return;

                let qualifiedTeams = [];
                const teamsList = Object.values(t.teams || {});

                if (t.stage === STAGES.GROUPS) {
                    const groups = [...new Set(Object.values(t.groupAssignments))].sort();
                    const quotaPerGroup = Math.floor(size / groups.length);
                    let runnersUpPool = [];
                    
                    groups.forEach(gId => {
                        const sorted = calculateStats(teamsList, matchesArr, gId, t.groupAssignments);
                        for (let i = 0; i < quotaPerGroup; i++) {
                            if (sorted[i]) qualifiedTeams.push(sorted[i][0]);
                        }
                        for (let i = quotaPerGroup; i < sorted.length; i++) {
                            if (sorted[i]) runnersUpPool.push(sorted[i]);
                        }
                    });

                    const remainingSlots = size - qualifiedTeams.length;
                    if (remainingSlots > 0) {
                        runnersUpPool.sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
                        for (let i = 0; i < remainingSlots; i++) {
                            if (runnersUpPool[i]) qualifiedTeams.push(runnersUpPool[i][0]);
                        }
                    }
                } else {
                    const sorted = calculateStats(teamsList, matchesArr);
                    for (let i = 0; i < size; i++) {
                        if (sorted[i]) qualifiedTeams.push(sorted[i][0]);
                    }
                }

                while (qualifiedTeams.length < size) { qualifiedTeams.push("TBD"); }
                
                t.stage = STAGES.KNOCKOUT;
                buildKnockoutRound(t.matches, qualifiedTeams, size, t.includeLosersFinal);
                pushUpdateData(t);
                return;
            }

            // Phase 2: Internal Bracket Evolution
            const currentRounds = [STAGES.R16, STAGES.QUARTERS, STAGES.SEMIS, STAGES.FINAL, STAGES.THIRD_PLACE];
            for (let roundLabel of currentRounds) {
                const roundMatches = matchesArr.filter(m => m.stage === roundLabel);
                if (roundMatches.length === 0) continue;

                // For KO matches, valid if s1 and s2 are present. If s1==s2, then p1 and p2 must be present and not equal.
                const roundFinished = roundMatches.every(m => {
                    if (m.s1 === "" || m.s2 === "") return false;
                    if (m.s1 === m.s2) {
                        return (m.p1 !== "" && m.p2 !== "" && m.p1 !== m.p2);
                    }
                    return true;
                });
                if (!roundFinished) break; 

                let nextRoundLabel = '';
                if (roundLabel === STAGES.R16) nextRoundLabel = STAGES.QUARTERS;
                if (roundLabel === STAGES.QUARTERS) nextRoundLabel = STAGES.SEMIS;
                if (roundLabel === STAGES.SEMIS) nextRoundLabel = STAGES.FINAL;
                if (nextRoundLabel === '') break;

                const nextRoundMatches = matchesArr.filter(m => m.stage === nextRoundLabel);
                if (nextRoundMatches.length > 0) continue;

                let nextBracketTeams = [];
                let defeatedTeams = [];

                roundMatches.sort((a,b) => a.koIndex - b.koIndex).forEach(m => {
                    const t1Wins = m.s1 > m.s2 || (m.s1 === m.s2 && m.p1 > m.p2);
                    if (t1Wins) {
                        nextBracketTeams.push(m.t1);
                        defeatedTeams.push(m.t2);
                    } else {
                        nextBracketTeams.push(m.t2);
                        defeatedTeams.push(m.t1);
                    }
                });

                buildKnockoutRound(t.matches, nextBracketTeams, nextBracketTeams.length, false); 

                if (roundLabel === STAGES.SEMIS && t.includeLosersFinal) {
                    const losersMatch = t.matches.find(m => m.stage === STAGES.THIRD_PLACE);
                    if (losersMatch && defeatedTeams.length >= 2) {
                        losersMatch.t1 = defeatedTeams[0];
                        losersMatch.t2 = defeatedTeams[1];
                    }
                }
                
                pushUpdateData(t);
                break;
            }
        }

        function calculateStats(teams, matches, filterGroup = null, groupAssignments = null) {
            const statsMap = {};
            const relevantTeams = filterGroup 
                ? (teams || []).filter(t => groupAssignments && groupAssignments[t.name] === filterGroup)
                : (teams || []);

            relevantTeams.forEach(t => { statsMap[t.name] = { pts: 0, gd: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 }; });
            
            (matches || []).forEach(m => {
                if ((m.stage === STAGES.GROUPS || m.stage === STAGES.LEAGUE) && statsMap[m.t1] && statsMap[m.t2]) {
                    if (m.s1 !== "" && m.s2 !== "") {
                        const s1 = Number(m.s1), s2 = Number(m.s2);
                        statsMap[m.t1].p++; statsMap[m.t2].p++;
                        statsMap[m.t1].gf += s1; statsMap[m.t1].ga += s2;
                        statsMap[m.t2].gf += s2; statsMap[m.t2].ga += s1;

                        if (s1 > s2) { statsMap[m.t1].w++; statsMap[m.t1].pts += 3; statsMap[m.t2].l++; } 
                        else if (s1 < s2) { statsMap[m.t2].w++; statsMap[m.t2].pts += 3; statsMap[m.t1].l++; } 
                        else { statsMap[m.t1].d++; statsMap[m.t1].pts += 1; statsMap[m.t2].d++; statsMap[m.t2].pts += 1; }
                        
                        statsMap[m.t1].gd = statsMap[m.t1].gf - statsMap[m.t1].ga;
                        statsMap[m.t2].gd = statsMap[m.t2].gf - statsMap[m.t2].ga;
                    }
                }
            });
            return Object.entries(statsMap).sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
        }

            const opt = {
                margin: 0.5,
                filename: fileName,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        };

        window.exportStandingsCSV = function() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const fileName = `${t.name.replace(/\s+/g, '_')}_Standings.csv`;
            const teamsList = Object.values(t.teams || {});
            const matchesList = Object.values(t.matches || {});
            let csvContent = "data:text/csv;charset=utf-8,";
            
            const addRows = (title, rows) => {
                csvContent += `${title}\nPos,Team,P,W,D,L,GD,Pts\n`;
                rows.forEach(([name, stat], i) => {
                    csvContent += `${i+1},"${name}",${stat.p},${stat.w},${stat.d},${stat.l},${stat.gd},${stat.pts}\n`;
                });
                csvContent += "\n";
            };

            if (t.format.includes('Groups') && t.groupAssignments) {
                const groups = [...new Set(Object.values(t.groupAssignments))].sort();
                groups.forEach(gId => addRows(`Group ${gId}`, calculateStats(teamsList, matchesList, gId, t.groupAssignments)));
            } else {
                addRows('Standings', calculateStats(teamsList, matchesList));
            }
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // ---------- CORE CONTROL MODIFIERS ----------
        window.attemptJoinDetail = async function(id, viewOnlyRequested = false) {
            const t = tournaments.find(x => x.id === id);
            if (!t) return;
            if (t.password && !viewOnlyRequested) {
                targetedLockedId = id;
                document.getElementById('entered-pin').value = '';
                document.getElementById('pin-modal').classList.remove('hidden');
            } else {
                launchDetailView(id, viewOnlyRequested);
            }
        };

        function launchDetailView(id, viewOnly) {
            activeTournamentId = id; isReadOnlyMode = viewOnly; currentTab = 'teams';
            const t = tournaments.find(x => x.id === id);
            document.getElementById('active-title').innerText = t.name;
            document.getElementById('active-format').innerText = `${t.format} (KO: Top ${t.koCount || 'None'})`;
            
            const badge = document.getElementById('role-badge');
            if(isReadOnlyMode) {
                badge.className = "flex items-center gap-1.5 bg-slate-200 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 px-4 py-1.5 rounded-full text-slate-600 dark:text-slate-400 text-[10px] font-black uppercase";
                badge.innerHTML = `<i data-lucide="eye" class="w-3.5 h-3.5"></i> Visitor`;
                document.getElementById('reset-tournament-btn').classList.add('hidden');
                document.getElementById('delete-arena-btn').classList.add('hidden');
            } else {
                badge.className = "flex items-center gap-1.5 bg-emerald-500 px-4 py-1.5 rounded-full text-white dark:text-slate-950 text-[10px] font-black uppercase shadow-sm";
                badge.innerHTML = `<i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin`;
                document.getElementById('reset-tournament-btn').classList.remove('hidden');
                document.getElementById('delete-arena-btn').classList.remove('hidden');
            }

            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('fab').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            renderTabsNav(); renderTabContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.showDashboard = function() {
            activeTournamentId = null;
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('fab').classList.remove('hidden');
            renderTournamentList();
        };

        window.switchTab = (tab) => { currentTab = tab; renderTabsNav(); renderTabContent(); };
        
        window.addTeam = async (name) => {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || isReadOnlyMode) return;
            
            // Check for duplicates
            const normalizedName = name.toLowerCase();
            if (Object.values(t.teams || {}).some(team => team.name.toLowerCase() === normalizedName)) {
                return alert("A team with this name already exists in the arena.");
            }

            if (!t.teams) t.teams = {};
            const teamId = generateUUID();
            t.teams[teamId] = { id: teamId, name: name };
            await pushUpdateData(t);
        };
        
        window.removeTeam = async (teamId) => {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (t && t.teams && !isReadOnlyMode) { 
                delete t.teams[teamId]; 
                await pushUpdateData(t); 
            }
        };

        window.updateMatchScore = function(matchId, teamNum, scoreType, scoreValue) {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || !t.matches) return;
            
            const match = t.matches.find(m => m.id === matchId);
            if (match) {
                let parsedScore = "";
                if (scoreValue !== "") {
                    parsedScore = parseInt(scoreValue, 10);
                    if (isNaN(parsedScore)) parsedScore = "";
                }
                
                const propName = scoreType === 'pen' ? `p${teamNum}` : `s${teamNum}`;
                match[propName] = parsedScore;
                
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(async () => {
                    evaluateAndAdvanceKnockout(t);
                    await pushUpdateData(t);
                    // Rerender specifically to show penalty inputs if they just tied in a KO game
                    renderTabContent();
                }, 500);
            }
        };

        window.toggleModalFields = function() {
            const fmt = document.getElementById('arena-format').value;
            const koWrapper = document.getElementById('knockout-teams-wrapper');
            const lfWrapper = document.getElementById('losers-final-wrapper');
            if (fmt === "League Table (1 Leg)" || fmt === "League Table (2 Legs)") {
                koWrapper.classList.add('hidden'); lfWrapper.classList.add('hidden');
            } else {
                koWrapper.classList.remove('hidden'); lfWrapper.classList.remove('hidden');
            }
        };

        // ---------- INITIALIZATION EVENTS ----------
        document.addEventListener('DOMContentLoaded', () => {
            initStorage();

            const body = document.body;
            document.getElementById('theme-toggle').onclick = () => {
                if(body.classList.contains('dark')) {
                    body.classList.remove('dark');
                } else {
                    body.classList.add('dark');
                }
            };
            
            // Check system preference
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                body.classList.add('dark');
            }

            document.getElementById('fab').onclick = () => {
                document.getElementById('create-modal').classList.remove('hidden');
                window.toggleModalFields();
            };
            
            document.getElementById('close-modal-btn').onclick = () => document.getElementById('create-modal').classList.add('hidden');
            
            document.getElementById('create-tournament-btn').onclick = async () => {
                const name = document.getElementById('arena-name').value.trim();
                if (!name) return alert("Missing Arena Name");
                
                if (tournaments.some(t => t.name.toLowerCase() === name.toLowerCase())) {
                    return alert("An Arena with this name already exists.");
                }

                const rawPin = document.getElementById('arena-pin').value.trim();
                const newId = generateUUID();
                
                const newTournament = {
                    id: newId,
                    name: name,
                    createdAt: Date.now(),
                    format: document.getElementById('arena-format').value,
                    koCount: document.getElementById('arena-ko-count').value,
                    includeLosersFinal: document.getElementById('arena-losers-final').checked,
                    password: await hashString(rawPin),
                    teams: {}, matches: [], groupAssignments: {}, stage: ''
                };

                document.getElementById('create-modal').classList.add('hidden');
                document.getElementById('arena-name').value = '';
                document.getElementById('arena-pin').value = '';
                
                // Optimistically update
                tournaments.push(newTournament);
                await pushUpdateData(newTournament);
                launchDetailView(newId, false);
            };

            document.getElementById('unlock-room-btn').onclick = async () => {
                const targetT = tournaments.find(x => x.id === targetedLockedId);
                const hashedInput = await hashString(document.getElementById('entered-pin').value);
                if (targetT && targetT.password === hashedInput) {
                    document.getElementById('pin-modal').classList.add('hidden');
                    launchDetailView(targetedLockedId, false);
                } else { alert("Invalid Entry PIN"); }
            };
            
            document.getElementById('cancel-pin-btn').onclick = () => document.getElementById('pin-modal').classList.add('hidden');
            document.getElementById('back-to-dashboard').onclick = window.showDashboard;
            document.getElementById('dashboard-link').onclick = window.showDashboard;

            document.getElementById('reset-tournament-btn').onclick = async () => {
                if (isReadOnlyMode) return;
                if (confirm("Reset tournament data? This clears matches and stats.")) {
                    const t = tournaments.find(x => x.id === activeTournamentId);
                    if (t) { 
                        t.matches = []; t.groupAssignments = {}; t.stage = ''; 
                        await pushUpdateData(t); 
                        window.switchTab('teams'); 
                    }
                }
            };
            
            document.getElementById('delete-arena-btn').onclick = async () => {
                if (isReadOnlyMode) return;
                if (confirm("Permanently wipe this tournament arena? This action cannot be undone.")) {
                    await deleteTournamentData(activeTournamentId);
                    window.showDashboard();
                }
            };
            
            refreshIcons();
        });
    </script>
</body>
</html>
