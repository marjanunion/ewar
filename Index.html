
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eWAR | Local Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0f18;
            color: #f1f5f9;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .emerald-gradient {
            background: linear-gradient(135deg, #34d399 0%, #06b6d4 100%);
        }

        input:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-card border-b border-slate-800/50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" onclick="showDashboard()">
            <div class="w-10 h-10 emerald-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 rotate-3 transition-transform hover:rotate-0">
                <i data-lucide="trophy" class="text-slate-900 w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-black italic text-xl leading-tight tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">eWAR</h1>
                <p class="text-[9px] font-bold text-slate-500 tracking-[0.2em] uppercase -mt-1">Local Arena</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-800">
                <i data-lucide="user" class="w-3 h-3 text-emerald-500"></i>
                <span class="text-[10px] font-mono text-slate-400">OFFLINE_USER</span>
            </div>
            <button onclick="clearAllData()" class="p-2.5 bg-slate-900 rounded-xl border border-slate-800 hover:bg-red-500/10 hover:border-red-500/50 group transition-all">
                <i data-lucide="trash-2" class="w-4 h-4 text-slate-500 group-hover:text-red-500"></i>
            </button>
        </div>
    </nav>

    <!-- Dashboard View -->
    <main id="dashboard-view" class="max-w-2xl mx-auto p-6 space-y-8 animate-slide-up">
        <section class="relative overflow-hidden bg-slate-900 rounded-[2rem] p-8 border border-slate-800 shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-3xl font-black mb-2 tracking-tight">Offline <span class="text-emerald-400">Mode.</span></h2>
                <p class="text-slate-400 text-sm max-w-[240px] leading-relaxed">Storage synced to local browser memory. No internet required.</p>
            </div>
            <div class="absolute top-0 right-0 w-48 h-48 bg-emerald-500/10 blur-[80px] rounded-full -mr-20 -mt-20"></div>
        </section>

        <div class="space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-3 h-3"></i> Local Rooms
                </h3>
            </div>
            
            <div id="tournament-list" class="grid gap-3">
                <!-- Tournaments injected here -->
            </div>
        </div>
    </main>

    <!-- Detail View (Hidden by default) -->
    <main id="detail-view" class="max-w-4xl mx-auto hidden animate-slide-up">
        <div class="p-6 bg-[#0a0f18] border-b border-slate-800 sticky top-16 z-40 backdrop-blur-md">
            <div class="flex justify-between items-start mb-4">
                <button onclick="showDashboard()" class="flex items-center gap-2 text-emerald-400 text-[10px] font-black uppercase hover:gap-3 transition-all">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Return to Dashboard
                </button>
                <button onclick="resetCurrentTournament()" class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1.5 rounded-xl text-[9px] font-black uppercase hover:bg-red-500 hover:text-white transition-all">
                    <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset Data
                </button>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h2 id="active-title" class="text-2xl sm:text-3xl font-black uppercase tracking-tight flex items-center gap-2">Tournament Name</h2>
                    <p id="active-format" class="text-slate-500 text-[10px] font-black uppercase tracking-widest">FORMAT</p>
                </div>
                <div class="flex items-center gap-1.5 bg-emerald-500 px-4 py-1.5 rounded-full text-slate-950 text-[10px] font-black uppercase shadow-lg shadow-emerald-500/20">
                    <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Local Admin
                </div>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="flex bg-slate-900/50 border-b border-slate-800 sticky top-[168px] z-40 backdrop-blur-md overflow-x-auto no-scrollbar" id="tab-bar">
            <button onclick="switchTab('teams')" data-tab="teams" class="flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5">Teams</button>
            <button onclick="switchTab('matches')" data-tab="matches" class="flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Matches</button>
            <button onclick="switchTab('standings')" data-tab="standings" class="flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all text-slate-500">Standings</button>
        </div>

        <div id="tab-content" class="p-6">
            <!-- Content injected here -->
        </div>
    </main>

    <!-- Floating Action Button -->
    <button id="fab" onclick="toggleModal('create-modal', true)" class="fixed bottom-8 right-8 bg-emerald-500 text-slate-950 p-5 rounded-[2rem] shadow-2xl shadow-emerald-500/40 z-[70] border-4 border-[#0a0f18] active:scale-90 transition-transform">
        <i data-lucide="plus" class="w-8 h-8" stroke-width="3"></i>
    </button>

    <!-- Create Modal -->
    <div id="create-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-sm rounded-[3rem] p-8 sm:p-10 border border-slate-800 shadow-2xl">
            <h3 class="text-2xl sm:text-3xl font-black mb-8 tracking-tighter italic uppercase">Forge Arena</h3>
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Arena Designation</label>
                    <input id="new-name" placeholder="Battlefield Alpha..." class="w-full p-4 sm:p-5 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none transition-colors" />
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Combat Protocol</label>
                    <select id="new-format" class="w-full p-4 sm:p-5 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none font-bold appearance-none">
                        <option value="Groups + Knockout">Groups + Knockout</option>
                        <option value="League Table (1 Leg)">League (1 Leg)</option>
                        <option value="League Table (2 Legs)">League (2 Legs)</option>
                    </select>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="toggleModal('create-modal', false)" class="flex-1 p-4 rounded-2xl font-black text-[10px] uppercase border border-slate-800">Abort</button>
                    <button onclick="createTournament()" class="flex-1 bg-emerald-500 text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-transform">Initialize</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Core State ---
        let tournaments = JSON.parse(localStorage.getItem('ewar_tournaments') || '[]');
        let activeTournamentId = null;
        let currentTab = 'teams';

        // --- Initialization ---
        window.onload = () => {
            renderTournamentList();
            lucide.createIcons();
        };

        // --- View Switching ---
        function showDashboard() {
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('fab').classList.remove('hidden');
            activeTournamentId = null;
            renderTournamentList();
        }

        function showDetail(id) {
            activeTournamentId = id;
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('fab').classList.add('hidden');
            
            const t = tournaments.find(x => x.id === id);
            document.getElementById('active-title').innerText = t.name;
            document.getElementById('active-format').innerText = t.format;
            
            renderTabContent();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('#tab-bar button').forEach(btn => {
                if (btn.dataset.tab === tab) {
                    btn.className = "flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5";
                } else {
                    btn.className = "flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all text-slate-500";
                }
            });
            renderTabContent();
        }

        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        // --- Data Operations ---
        function save() {
            localStorage.setItem('ewar_tournaments', JSON.stringify(tournaments));
        }

        function createTournament() {
            const name = document.getElementById('new-name').value;
            const format = document.getElementById('new-format').value;
            if (!name) return;

            const newT = {
                id: Date.now().toString(),
                name: name,
                format: format,
                teams: [],
                matches: [],
                groupAssignments: null,
                createdAt: Date.now()
            };

            tournaments.push(newT);
            save();
            toggleModal('create-modal', false);
            document.getElementById('new-name').value = '';
            renderTournamentList();
        }

        function addTeam(name) {
            if (!name.trim()) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (t.teams.some(x => x.name.toLowerCase() === name.trim().toLowerCase())) return;
            
            t.teams.push({ id: Date.now().toString(), name: name.trim() });
            save();
            renderTabContent();
        }

        function removeTeam(teamId) {
            const t = tournaments.find(x => x.id === activeTournamentId);
            t.teams = t.teams.filter(x => x.id !== teamId);
            save();
            renderTabContent();
        }

        function setScore(matchIdx, s1, s2) {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (s1 !== null) t.matches[matchIdx].s1 = s1 === "" ? null : Number(s1);
            if (s2 !== null) t.matches[matchIdx].s2 = s2 === "" ? null : Number(s2);
            save();
        }

        function resetCurrentTournament() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            t.matches = [];
            t.groupAssignments = null;
            save();
            switchTab('teams');
        }

        function clearAllData() {
            if (confirm("Erase all tournament data from this browser?")) {
                tournaments = [];
                save();
                showDashboard();
            }
        }

        // --- Logic Engine ---
        function generateStage() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            const isGrouped = t.format.includes('Group');
            if (isGrouped && t.teams.length < 4) return;

            const matches = [];
            const teams = [...t.teams].sort(() => Math.random() - 0.5);
            const legs = t.format.includes('2 Legs') ? 2 : 1;
            const groupAssignments = {};

            if (isGrouped) {
                let remaining = [...teams];
                let groupIdx = 0;
                let groupCount = teams.length > 8 ? Math.floor(teams.length / 4) : 2;
                if (teams.length === 6) groupCount = 2;
                const teamsPerGroup = Math.ceil(teams.length / groupCount);

                while (remaining.length > 0) {
                    groupIdx++;
                    const group = remaining.splice(0, teamsPerGroup);
                    group.forEach(team => groupAssignments[team.name] = groupIdx);

                    for (let i = 0; i < group.length; i++) {
                        for (let j = i + 1; j < group.length; j++) {
                            for (let l = 0; l < legs; l++) {
                                matches.push({
                                    id: Math.random().toString(36).substr(2, 9),
                                    t1: group[i].name, t2: group[j].name,
                                    s1: null, s2: null, stage: 'Group Stage', grp: groupIdx
                                });
                            }
                        }
                    }
                }
                t.groupAssignments = groupAssignments;
            } else {
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        for (let l = 0; l < legs; l++) {
                            matches.push({
                                id: Math.random().toString(36).substr(2, 9),
                                t1: teams[i].name, t2: teams[j].name,
                                s1: null, s2: null, stage: 'League'
                            });
                        }
                    }
                }
            }

            t.matches = matches;
            save();
            renderTabContent();
        }

        function calculateStats(teams, matches, filterGroup = null, groupAssignments = null) {
            const s = {};
            const relevantTeams = filterGroup 
                ? teams.filter(t => groupAssignments?.[t.name] === filterGroup)
                : teams;

            relevantTeams.forEach(t => s[t.name] = { pts: 0, gd: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 });
            
            matches.forEach(m => {
                if (s[m.t1] && s[m.t2] && m.s1 !== null && m.s2 !== null) {
                    s[m.t1].p++; s[m.t2].p++;
                    s[m.t1].gf += m.s1; s[m.t1].ga += m.s2;
                    s[m.t2].gf += m.s2; s[m.t2].ga += m.s1;
                    s[m.t1].gd = s[m.t1].gf - s[m.t1].ga;
                    s[m.t2].gd = s[m.t2].gf - s[m.t2].ga;
                    if (m.s1 > m.s2) { s[m.t1].pts += 3; s[m.t1].w++; s[m.t2].l++; }
                    else if (m.s2 > m.s1) { s[m.t2].pts += 3; s[m.t2].w++; s[m.t1].l++; }
                    else { s[m.t1].pts += 1; s[m.t2].pts += 1; s[m.t1].d++; s[m.t2].d++; }
                }
            });
            return Object.entries(s).sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
        }

        // --- Rendering ---
        function renderTournamentList() {
            const list = document.getElementById('tournament-list');
            list.innerHTML = tournaments.length ? '' : `
                <div class="py-20 text-center border-2 border-dashed border-slate-800 rounded-[2rem]">
                    <p class="text-slate-600 text-xs font-black uppercase tracking-widest">No Arenas Created</p>
                </div>
            `;

            tournaments.slice().reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "group bg-slate-900/50 border border-slate-800/80 p-5 rounded-3xl flex justify-between items-center cursor-pointer hover:bg-slate-800 hover:border-emerald-500/30 transition-all active:scale-[0.98]";
                card.onclick = () => showDetail(t.id);
                card.innerHTML = `
                    <div class="flex gap-4 items-center">
                        <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center">
                            <i data-lucide="users" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-base group-hover:text-emerald-400 transition-colors">${t.name}</h4>
                            <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold uppercase tracking-wider">
                                <span class="text-emerald-500/70">${t.format}</span>
                                <span>•</span>
                                <span>${t.teams.length} Teams</span>
                            </div>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-700 group-hover:text-emerald-500 transition-colors"></i>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function renderTabContent() {
            const container = document.getElementById('tab-content');
            const t = tournaments.find(x => x.id === activeTournamentId);
            container.innerHTML = '';

            if (currentTab === 'teams') {
                const enrolledHtml = t.teams.map(team => `
                    <div class="bg-slate-900/40 border border-slate-800/60 p-5 rounded-3xl flex justify-between items-center group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-emerald-500">
                                ${team.name.slice(0, 2).toUpperCase()}
                            </div>
                            <p class="font-bold text-base">${team.name}</p>
                        </div>
                        ${t.matches.length === 0 ? `<button onclick="removeTeam('${team.id}')" class="p-2 text-slate-600 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="space-y-6">
                        ${t.matches.length === 0 ? `
                            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] space-y-5">
                                <div class="flex items-center gap-2 mb-2">
                                    <i data-lucide="plus" class="w-4 h-4 text-emerald-500"></i>
                                    <h3 class="text-xs font-black uppercase text-slate-400">Enroll Team</h3>
                                </div>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <input id="team-input" placeholder="Enter team name..." class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm outline-none" onkeydown="if(event.key==='Enter') addTeam(this.value)" />
                                    <button onclick="addTeam(document.getElementById('team-input').value)" class="bg-emerald-500 text-slate-950 px-8 py-4 rounded-2xl font-black text-[11px] uppercase transition-transform active:scale-95">Add Team</button>
                                </div>
                            </div>
                        ` : ''}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            ${enrolledHtml || '<p class="col-span-full py-12 text-center text-slate-600 text-xs font-bold uppercase">No teams enrolled</p>'}
                        </div>
                    </div>
                `;
            }

            if (currentTab === 'matches') {
                if (t.matches.length === 0) {
                    container.innerHTML = `
                        <div class="text-center space-y-4">
                            <button onclick="generateStage()" class="w-full bg-emerald-500 text-slate-950 py-6 rounded-[2.5rem] font-black text-[12px] uppercase shadow-2xl shadow-emerald-500/20 active:scale-[0.98] transition-all">
                                Initialize Brackets
                            </button>
                        </div>
                    `;
                } else {
                    const matchesHtml = t.matches.map((m, idx) => `
                        <div class="bg-slate-900 border border-slate-800/50 p-6 sm:p-8 rounded-[2.5rem]">
                            <div class="flex justify-between items-center mb-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <span>Match ${idx + 1}</span>
                                <span class="text-emerald-500">${m.stage} ${m.grp ? `• GROUP ${m.grp}` : ''}</span>
                            </div>
                            <div class="flex items-center justify-between gap-4">
                                <div class="flex-1 text-center space-y-3">
                                    <p class="text-xs font-black truncate">${m.t1}</p>
                                    <input type="number" value="${m.s1 ?? ''}" oninput="setScore(${idx}, this.value, null)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-center font-black text-xl outline-none" />
                                </div>
                                <div class="text-slate-800 font-black text-[10px] pt-8">VS</div>
                                <div class="flex-1 text-center space-y-3">
                                    <p class="text-xs font-black truncate">${m.t2}</p>
                                    <input type="number" value="${m.s2 ?? ''}" oninput="setScore(${idx}, null, this.value)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-2xl text-center font-black text-xl outline-none" />
                                </div>
                            </div>
                        </div>
                    `).join('');
                    container.innerHTML = `<div class="grid gap-4">${matchesHtml}</div>`;
                }
            }

            if (currentTab === 'standings') {
                const groupIds = t.groupAssignments ? Array.from(new Set(Object.values(t.groupAssignments))).sort((a,b)=>a-b) : [null];
                
                container.innerHTML = groupIds.map(gid => {
                    const stats = calculateStats(t.teams, t.matches, gid, t.groupAssignments);
                    return `
                        <div class="mb-10">
                            ${gid ? `<h3 class="text-xs font-black uppercase text-emerald-500 tracking-widest mb-4 ml-4">Group ${gid}</h3>` : ''}
                            <div class="bg-slate-900 border border-slate-800 p-5 rounded-[2.5rem] shadow-xl overflow-x-auto no-scrollbar">
                                <table class="w-full text-left min-w-[400px]">
                                    <thead>
                                        <tr class="text-[10px] font-black text-slate-500 uppercase border-b border-slate-800">
                                            <th class="pb-4">Team</th>
                                            <th class="pb-4 text-center">P</th>
                                            <th class="pb-4 text-center">GD</th>
                                            <th class="pb-4 text-center">PTS</th>
                                        </tr>
                                    </thead>
                                    <tbody class="text-xs font-bold">
                                        ${stats.map(([name, s]) => `
                                            <tr class="border-b border-slate-800/30">
                                                <td class="py-4">${name}</td>
                                                <td class="py-4 text-center text-slate-500">${s.p}</td>
                                                <td class="py-4 text-center text-slate-500">${s.gd}</td>
                                                <td class="py-4 text-center text-emerald-400 font-black text-sm">${s.pts}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            lucide.createIcons();
        }
    </script>
</body>
</html>
