<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eWAR | Tournament Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML2PDF Library for PDF Export -->

    <!-- Firebase Core and Realtime Database Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBk1d837ftOEGco6B5bP0iTQwyKLw7VpeU",
            authDomain: "ewar-fa1db.firebaseapp.com",
            databaseURL: "https://ewar-fa1db-default-rtdb.firebaseio.com",
            projectId: "ewar-fa1db",
            storageBucket: "ewar-fa1db.firebasestorage.app",
            messagingSenderId: "287555570705",
            appId: "1:287555570705:web:bfbd53a520cf7fb8daf5b0",
            measurementId: "G-3P3RYNZXL0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.firebaseDb = db;
        window.dbRef = ref(db, 'tournaments');
        window.writeDatabase = (data) => set(ref(db, 'tournaments'), data);
        
        syncWithFirebase();
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0f18;
            color: #f1f5f9;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #2dd4bf33; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2dd4bf; }
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(51, 65, 85, 0.4);

        input:focus, select:focus, textarea:focus {
            outline: none;

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24 antialiased">

    <main id="dashboard-view" class="max-w-2xl mx-auto p-5 sm:p-6 space-y-8 animate-slide-up">

    <!-- Floating Action Button -->
    <button id="fab" class="fixed bottom-8 right-8 bg-emerald-500 text-slate-950 p-5 rounded-[2rem] shadow-2xl shadow-emerald-500/40 z-[70] border-4 border-[#0a0f18] active:scale-90 transition-transform hover:bg-emerald-400 hover:scale-105">

    <div id="create-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-sm rounded-[3rem] p-8 sm:p-10 border border-slate-800 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl sm:text-3xl font-black mb-6 tracking-tighter italic uppercase text-center text-emerald-400">Forge Arena</h3>
            <div class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Arena Name</label>

                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Tournament Format</label>

                        <option value="League Table (2 Legs)">League (2 Legs)</option>

                <!-- Advanced Configuration Options -->
                <div id="knockout-teams-wrapper" class="space-y-1">

                    <input type="checkbox" id="arena-losers-final" checked class="w-4 h-4 accent-emerald-500 bg-slate-950 border-slate-800 rounded">

                <div class="space-y-1">
                    <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Access PIN (Optional)</label>
                    <input id="arena-pin" type="password" placeholder="••••" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 text-sm outline-none text-white">

                    <button id="close-modal-btn" class="flex-1 p-4 rounded-2xl font-black text-[10px] uppercase border border-slate-800 hover:bg-slate-800 transition-colors">Cancel</button>
                    <button id="create-tournament-btn" class="flex-1 bg-emerald-500 text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-transform hover:bg-emerald-400">Create Arena</button>
                </div>

    <!-- PIN Prompt Modal -->
    <div id="pin-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-[#0a0f18]/95 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-xs rounded-[3rem] p-10 border border-slate-800 text-center">
            <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="lock" class="w-8 h-8 text-amber-500"></i>
            </div>
            <h3 class="font-black text-xl mb-6 tracking-tight uppercase italic text-amber-500">Protected Entry</h3>
            <input id="entered-pin" type="password" placeholder="PIN CODE" class="w-full p-5 rounded-[2rem] bg-slate-950 border border-slate-800 text-center text-xl tracking-[0.3em] mb-8 outline-none text-white">
            <div class="flex gap-3">
                <button id="cancel-pin-btn" class="flex-1 p-4 rounded-2xl border border-slate-800 font-black text-[10px] uppercase hover:bg-slate-800 transition-colors">Cancel</button>
                <button id="unlock-room-btn" class="flex-1 bg-amber-500 text-slate-950 p-4 rounded-2xl font-black text-[10px] uppercase hover:bg-amber-400 transition-colors">Unlock</button>
            </div>
        </div>
    </div>

    <script>
        let tournaments = [];
        let activeTournamentId = null;
        let targetedLockedId = null;
        let currentTab = 'teams';
        let isReadOnlyMode = false;
        let pendingActionIsViewOnly = false;

        function generateUUID() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function refreshIcons() { if (window.lucide) setTimeout(() => window.lucide.createIcons(), 10); }

        function toggleModalFields() {
            const fmt = document.getElementById('arena-format').value;
            const koWrapper = document.getElementById('knockout-teams-wrapper');
            const lfWrapper = document.getElementById('losers-final-wrapper');
            
            if (fmt === "League Table (1 Leg)" || fmt === "League Table (2 Legs)") {
                koWrapper.classList.add('hidden');
                lfWrapper.classList.add('hidden');
            } else {
                koWrapper.classList.remove('hidden');
                lfWrapper.classList.remove('hidden');
            }
        }

        // ---------- REALTIME SYNC HANDLERS ----------
        function syncWithFirebase() {
            if (!window.dbRef) { setTimeout(syncWithFirebase, 100); return; }
            import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js").then((mod) => {
                mod.onValue(window.dbRef, (snapshot) => {
                    const data = snapshot.val();
                    tournaments = data ? Object.values(data) : [];
                    
                    const dot = document.getElementById('sync-dot');
                    const label = document.getElementById('sync-text');
                    if(dot && label) {
                        dot.className = "w-1.5 h-1.5 rounded-full bg-emerald-500";
                        label.innerText = "Live Engine Active";
                    }

                    renderTournamentList();
                    
                    if (activeTournamentId) {
                        const currentActiveT = tournaments.find(x => x.id === activeTournamentId);
                        if (!currentActiveT) {
                            showDashboard(); 
                        } else {
                            // GLITCH FIX: Check if the user is currently typing in a score input.
                            // If they are, do NOT re-render the entire DOM to prevent losing focus.
                            // The input's onblur or next input event will eventually trigger a full sync.
                            const activeEl = document.activeElement;
                            const isInputFocused = activeEl && activeEl.tagName === 'INPUT' && activeEl.classList.contains('match-score-input');
                            
                            if (!isInputFocused) {
                                renderTabsNav(); 
                                renderTabContent();
                            }
                        }
                    }
                });
            });
        }

        function pushUpdateData() {
            if (window.writeDatabase) {
                const syncData = {};
                tournaments.forEach(t => { syncData[t.id] = t; });
                window.writeDatabase(syncData);
            }
        }

        // ---------- BRACKET GENERATION ENGINE ----------
        function generateStage() {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            
            const teamList = t.teams ? Object.values(t.teams) : [];
            if (teamList.length < 2) { alert("Need at least 2 teams to generate matches."); return; }

            const matches = [];
            const teams = [...teamList].sort(() => Math.random() - 0.5);

            if (t.format === "Pure Knockout") {
                const size = parseInt(t.koCount || 4, 10);
                if (teams.length < size) { alert(`Enrolled teams (${teams.length}) is less than the bracket size (${size}).`); return; }
                const bracketTeams = teams.slice(0, size);
                buildKnockoutRound(matches, bracketTeams, size, t.includeLosersFinal);
                t.stage = 'Knockout';
            } 
            else if (t.format.includes('Groups')) {
                if (teamList.length < 4) { alert("Groups require at least 4 teams."); return; }
                let remaining = [...teams];
                let groupIdx = 0;
                let groupCount = Math.min(Math.floor(teamList.length / 3), 4);
                if (groupCount < 2) groupCount = 2;
                const teamsPerGroup = Math.ceil(teamList.length / groupCount);
                const groupAssignments = {};

                while (remaining.length > 0 && groupIdx < groupCount) {
                    groupIdx++;
                    const group = remaining.splice(0, Math.min(teamsPerGroup, remaining.length));
                    group.forEach(team => groupAssignments[team.name] = groupIdx);

                    for (let i = 0; i < group.length; i++) {
                        for (let j = i + 1; j < group.length; j++) {
                            matches.push({ id: generateUUID(), t1: group[i].name, t2: group[j].name, s1: "", s2: "", stage: 'Group Stage', grp: groupIdx });
                        }
                    }
                }
                t.groupAssignments = groupAssignments;
                t.stage = 'Groups';
            } 
            else {
                // Standard Round Robin League
                const legs = t.format.includes('2 Legs') ? 2 : 1;
                for (let i = 0; i < teams.length; i++) {
                    for (let j = i + 1; j < teams.length; j++) {
                        for (let l = 0; l < legs; l++) {
                            matches.push({ id: generateUUID(), t1: teams[i].name, t2: teams[j].name, s1: "", s2: "", stage: 'League' });
                        }
                    }
                }
                t.stage = 'League';
            }

            t.matches = matches;
            pushUpdateData();
            switchTab('matches');
        }

        function buildKnockoutRound(matches, bracketTeams, size, includeLosers) {
            let label = size === 2 ? 'Final' : size === 4 ? 'Semifinals' : size === 8 ? 'Quarterfinals' : 'Round of 16';
            for (let i = 0; i < size; i += 2) {
                matches.push({
                    id: generateUUID(),
                    t1: bracketTeams[i] ? bracketTeams[i].name || bracketTeams[i] : "TBD",
                    t2: bracketTeams[i+1] ? bracketTeams[i+1].name || bracketTeams[i+1] : "TBD",
                    s1: "", s2: "",
                    stage: label,
                    koIndex: i / 2,
                    totalKoSlots: size
                });
            }
            if (size === 4 && includeLosers) {
                matches.push({ id: generateUUID(), t1: "TBD", t2: "TBD", s1: "", s2: "", stage: '3rd Place Match', koIndex: 99, totalKoSlots: 4 });
            }
        }

        // ---------- AUTO-ADVANCE EVALUATOR ENGINE ----------
        function evaluateAndAdvanceKnockout() {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || !t.matches || t.matches.length === 0 || t.format === "League Table (1 Leg)" || t.format === "League Table (2 Legs)") return;

            const matchesArr = Object.values(t.matches);
            const size = parseInt(t.koCount || 4, 10);
            
            // Phase 1: Qualification from Groups/League Table to Initial Knockout Stage
            if (t.stage === 'Groups' || t.stage === 'League') {
                const allFinished = matchesArr.every(m => m.stage.includes('Stage') || m.stage === 'League' ? (m.s1 !== "" && m.s2 !== "" && m.s1 !== null && m.s2 !== null && !isNaN(m.s1) && !isNaN(m.s2)) : true);
                if (!allFinished) return;

                let qualifiedTeams = [];
                const teamsList = Object.values(t.teams);

                if (t.stage === 'Groups') {
                    const groups = [...new Set(Object.values(t.groupAssignments))].sort();
                    const quotaPerGroup = Math.max(1, Math.floor(size / groups.length));
                    
                    groups.forEach(gId => {
                        const sorted = calculateStats(teamsList, matchesArr, gId, t.groupAssignments);
                        for (let i = 0; i < quotaPerGroup; i++) {
                            if (sorted[i]) qualifiedTeams.push(sorted[i][0]);
                        }
                    });
                } else {
                    const sorted = calculateStats(teamsList, matchesArr);
                    for (let i = 0; i < size; i++) {
                        if (sorted[i]) qualifiedTeams.push(sorted[i][0]);
                    }
                }

                // Balance remaining bracket slots if constraints drop teams
                while (qualifiedTeams.length < size) { qualifiedTeams.push("TBD"); }
                
                t.stage = 'Knockout';
                buildKnockoutRound(t.matches, qualifiedTeams, size, t.includeLosersFinal);
                pushUpdateData();
                return;
            }

            // Phase 2: Internal Bracket Evolution Progressions
            const currentRounds = ['Round of 16', 'Quarterfinals', 'Semifinals', 'Final', '3rd Place Match'];
            for (let roundLabel of currentRounds) {
                const roundMatches = matchesArr.filter(m => m.stage === roundLabel);
                if (roundMatches.length === 0) continue;

                const roundFinished = roundMatches.every(m => m.s1 !== "" && m.s2 !== "" && m.s1 !== null && m.s2 !== null && !isNaN(m.s1) && !isNaN(m.s2));
                if (!roundFinished) break; 

                // Generate next chronological step label
                let nextRoundLabel = '';
                if (roundLabel === 'Round of 16') nextRoundLabel = 'Quarterfinals';
                if (roundLabel === 'Quarterfinals') nextRoundLabel = 'Semifinals';
                if (roundLabel === 'Semifinals') nextRoundLabel = 'Final';
                if (nextRoundLabel === '') break;

                const nextRoundMatches = matchesArr.filter(m => m.stage === nextRoundLabel);
                if (nextRoundMatches.length > 0) continue; // Already generated

                let nextBracketTeams = [];
                let defeatedTeams = [];

                roundMatches.sort((a,b) => a.koIndex - b.koIndex).forEach(m => {
                    if (parseInt(m.s1, 10) > parseInt(m.s2, 10)) {
                        nextBracketTeams.push(m.t1);
                        defeatedTeams.push(m.t2);
                    } else {
                        nextBracketTeams.push(m.t2);
                        defeatedTeams.push(m.t1);
                    }
                });

                const nextSize = nextBracketTeams.length;
                buildKnockoutRound(t.matches, nextBracketTeams, nextSize, false); 

                // Inject dynamic automated values into 3rd Place match if active
                if (roundLabel === 'Semifinals' && t.includeLosersFinal) {
                    const losersMatch = t.matches.find(m => m.stage === '3rd Place Match');
                    if (losersMatch && defeatedTeams.length >= 2) {
                        losersMatch.t1 = defeatedTeams[0];
                        losersMatch.t2 = defeatedTeams[1];
                    }
                }
                
                pushUpdateData();
                break;
            }
        }

        // Glitch Fix: Added robust type checking for scores to prevent NaN bugs
        function calculateStats(teams, matches, filterGroup = null, groupAssignments = null) {
            const statsMap = {};
            const relevantTeams = filterGroup 
                ? (teams || []).filter(t => groupAssignments && groupAssignments[t.name] === filterGroup)
                : (teams || []);

            relevantTeams.forEach(t => { statsMap[t.name] = { pts: 0, gd: 0, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 }; });
            
            (matches || []).forEach(m => {
                if ((m.stage.includes('Stage') || m.stage === 'League') && statsMap[m.t1] && statsMap[m.t2]) {
                    // Make sure scores exist and are valid numbers before calculating
                    if (m.s1 !== "" && m.s2 !== "" && m.s1 !== null && m.s2 !== null) {
                        const s1 = Number(m.s1), s2 = Number(m.s2);
                        if(!isNaN(s1) && !isNaN(s2)) {
                            statsMap[m.t1].p++; statsMap[m.t2].p++;
                            statsMap[m.t1].gf += s1; statsMap[m.t1].ga += s2;
                            statsMap[m.t2].gf += s2; statsMap[m.t2].ga += s1;

                            if (s1 > s2) { statsMap[m.t1].w++; statsMap[m.t1].pts += 3; statsMap[m.t2].l++; } 
                            else if (s1 < s2) { statsMap[m.t2].w++; statsMap[m.t2].pts += 3; statsMap[m.t1].l++; } 
                            else { statsMap[m.t1].d++; statsMap[m.t1].pts += 1; statsMap[m.t2].d++; statsMap[m.t2].pts += 1; }
                            
                            statsMap[m.t1].gd = statsMap[m.t1].gf - statsMap[m.t1].ga;
                            statsMap[m.t2].gd = statsMap[m.t2].gf - statsMap[m.t2].ga;
                        }
                    }
                }
            });
            return Object.entries(statsMap).sort((a, b) => b[1].pts - a[1].pts || b[1].gd - a[1].gd || b[1].gf - a[1].gf);
        }

        // ---------- VIEWS GENERATOR ENGINE ----------
        function renderTournamentList() {
            const list = document.getElementById('tournament-list');
            if (!list) return;
            list.innerHTML = '';
            
            if (tournaments.length === 0) {
                list.innerHTML = `
                    <div class="py-20 text-center border-2 border-dashed border-slate-800 rounded-[2rem]">
                        <i data-lucide="shield-alert" class="w-8 h-8 text-slate-700 mx-auto mb-3"></i>
                        <p class="text-slate-600 text-xs font-black uppercase tracking-widest">No Arenas Online</p>
                    </div>`;
                refreshIcons(); return;
            }

            tournaments.forEach(t => {
                const isLocked = t.password && t.password.trim() !== '';
                const card = document.createElement('div');
                card.className = "group bg-slate-900/50 border border-slate-800/80 p-5 rounded-3xl flex justify-between items-center hover:border-slate-700 transition-all";
                card.innerHTML = `
                    <div class="flex gap-4 items-center flex-1 cursor-pointer" id="edit-trigger-${t.id}">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${isLocked ? 'bg-amber-500/10' : 'bg-blue-500/10'} border border-slate-800">
                            <i data-lucide="${isLocked ? 'lock' : 'users'}" class="w-5 h-5 ${isLocked ? 'text-amber-500' : 'text-blue-500'}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-base group-hover:text-emerald-400 transition-colors">${escapeHtml(t.name)}</h4>
                            <div class="flex flex-wrap items-center gap-2 text-[9px] text-slate-500 font-black uppercase tracking-wider">
                                <span class="text-emerald-500">${escapeHtml(t.format)}</span>
                                <span>•</span>
                                <span>${t.teams ? Object.keys(t.teams).length : 0} Teams</span>
                                ${t.koCount ? `<span>•</span><span class="text-cyan-400">KO: Top ${t.koCount}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="view-trigger-${t.id}" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 border border-slate-700 text-slate-300 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all flex items-center gap-1.5 shadow-lg">
                            <i data-lucide="eye" class="w-3.5 h-3.5"></i> View
                        </button>
                    </div>`;
                list.appendChild(card);
                document.getElementById(`edit-trigger-${t.id}`).onclick = () => attemptJoinDetail(t.id, false);
                document.getElementById(`view-trigger-${t.id}`).onclick = (e) => { e.stopPropagation(); attemptJoinDetail(t.id, true); };
            });
            refreshIcons();
        }

        function renderTabsNav() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const bar = document.getElementById('tab-bar');
            if (!bar) return;
            
            const tabs = ['teams'];
            if (t.format.includes('Groups') && t.groupAssignments) tabs.push('groups');
            tabs.push('matches', 'standings');

            bar.innerHTML = tabs.map(tab => {
                const isActive = currentTab === tab;
                return `
                    <button onclick="switchTab('${tab}')" class="flex-1 min-w-[100px] py-5 text-[10px] font-black uppercase tracking-widest transition-all ${isActive ? 'text-emerald-400 border-b-2 border-emerald-500 bg-emerald-500/5' : 'text-slate-500'}">
                        ${tab}
                    </button>
                `;
            }).join('');
        }

        function renderTabContent() {
            const container = document.getElementById('tab-content');
            if (!container) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            container.innerHTML = '';

            if (currentTab === 'teams') {
                const teamsArr = t.teams ? Object.values(t.teams) : [];
                const enrolledHtml = teamsArr.map(team => `
                    <div class="bg-slate-900/40 border border-slate-800/60 p-5 rounded-3xl flex justify-between items-center">
                        <span class="font-bold text-base">${escapeHtml(team.name)}</span>
                        ${((!t.matches || t.matches.length === 0) && !isReadOnlyMode) ? `<button onclick="removeTeam('${team.id}')" class="p-2 text-slate-600 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="space-y-6">
                        ${((!t.matches || t.matches.length === 0) && !isReadOnlyMode) ? `
                            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] space-y-4">
                                <h3 class="text-xs font-black uppercase text-slate-400">Enroll Team Unit</h3>
                                <div class="flex gap-3">
                                    <input id="team-input" placeholder="Team name..." class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-white" />
                                    <button id="add-team-btn" class="bg-emerald-500 text-slate-950 px-8 rounded-2xl font-black text-[11px] uppercase hover:bg-emerald-400 transition-colors">Add</button>
                                </div>
                            </div>` : ''}
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${enrolledHtml || '<p class="col-span-full text-center text-slate-600 py-4 uppercase font-bold text-xs">Empty roster</p>'}</div>
                    </div>`;

                if (document.getElementById('add-team-btn')) {
                    document.getElementById('add-team-btn').onclick = () => {
                        const inp = document.getElementById('team-input');
                        if (inp.value.trim()) { addTeam(inp.value.trim()); inp.value = ''; }
                    };
                }
            }

            if (currentTab === 'groups' && t.groupAssignments) {
                const groupedMap = {};
                Object.values(t.teams || {}).forEach(team => {
                    const gId = t.groupAssignments[team.name] || 'Unassigned';
                    if (!groupedMap[gId]) groupedMap[gId] = [];
                    groupedMap[gId].push(team);
                });
                container.innerHTML = Object.entries(groupedMap).map(([gId, gTeams]) => `
                    <div class="bg-slate-900/30 border border-slate-800 p-6 rounded-[2.5rem] mb-4">
                        <h3 class="text-xs font-black text-emerald-400 mb-4 uppercase tracking-widest">Group Pool ${gId}</h3>
                        <div class="grid grid-cols-2 gap-3">${gTeams.map(gt => `<div class="bg-slate-950 p-4 rounded-xl border border-slate-800/40 font-bold text-sm text-slate-300">${escapeHtml(gt.name)}</div>`).join('')}</div>
                    </div>`).join('');
            }

            if (currentTab === 'matches') {
                const matchesArr = t.matches ? Object.values(t.matches) : [];
                if (matchesArr.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 max-w-sm mx-auto space-y-4">
                            <i data-lucide="git-pull-request" class="w-8 h-8 text-slate-700 mx-auto"></i>
                            ${!isReadOnlyMode ? `<button onclick="generateStage()" class="w-full bg-emerald-500 text-slate-950 py-4 rounded-2xl font-black text-[11px] uppercase hover:bg-emerald-400 transition-colors">Generate Arena Brackets</button>` : '<p class="text-slate-600 text-xs font-black uppercase">Uninitialized Brackets</p>'}
                        </div>`;
                } else {
                    // Feature: Search Bar added here
                    let htmlBuilder = `
                        <div class="mb-6 relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                            <input type="text" id="match-search" placeholder="Search for a team..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-3 pl-11 pr-4 text-sm text-white outline-none focus:border-emerald-500 transition-colors shadow-inner">
                        </div>
                    `;

                    // Group fixtures by Stage labels
                    const stagesMap = {};
                    matchesArr.forEach(m => {
                        if (!stagesMap[m.stage]) stagesMap[m.stage] = [];
                        stagesMap[m.stage].push(m);
                    });

                    htmlBuilder += Object.entries(stagesMap).map(([stageName, items]) => `
                        <div class="mb-8 match-stage-container">
                            <h3 class="text-xs font-black text-cyan-400 tracking-widest uppercase mb-4 border-b border-slate-800/50 pb-2">${stageName} Round</h3>
                            <div class="grid gap-4 md:grid-cols-2">
                                ${items.map(m => `
                                    <div class="match-card bg-slate-900 border border-slate-800/60 p-5 rounded-[2rem] flex flex-col justify-between" data-searchable="${escapeHtml(m.t1).toLowerCase()} ${escapeHtml(m.t2).toLowerCase()}">
                                        <div class="flex items-center justify-between gap-2">
                                            <div class="flex-1 text-center space-y-1 w-0">
                                                <p class="text-xs font-bold text-slate-200 truncate w-full" title="${escapeHtml(m.t1)}">${escapeHtml(m.t1)}</p>
                                                <input type="number" placeholder="-" value="${m.s1 !== undefined ? m.s1 : ''}" data-match-id="${m.id}" data-team="1" ${isReadOnlyMode ? 'disabled' : ''} class="match-score-input w-12 bg-slate-950 border border-slate-800 text-center p-2 rounded-xl font-black text-white focus:border-emerald-500 outline-none transition-colors" />
                                            </div>
                                            <div class="text-[9px] font-black text-slate-600 px-2">VS</div>
                                            <div class="flex-1 text-center space-y-1 w-0">
                                                <p class="text-xs font-bold text-slate-200 truncate w-full" title="${escapeHtml(m.t2)}">${escapeHtml(m.t2)}</p>
                                                <input type="number" placeholder="-" value="${m.s2 !== undefined ? m.s2 : ''}" data-match-id="${m.id}" data-team="2" ${isReadOnlyMode ? 'disabled' : ''} class="match-score-input w-12 bg-slate-950 border border-slate-800 text-center p-2 rounded-xl font-black text-white focus:border-emerald-500 outline-none transition-colors" />
                                            </div>
                                        </div>
                                    </div>`).join('')}
                            </div>
                        </div>`).join('');
                        
                    container.innerHTML = htmlBuilder;

                    // Add Search Functionality
                    const searchInput = document.getElementById('match-search');
                    if(searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            const term = e.target.value.toLowerCase();
                            document.querySelectorAll('.match-stage-container').forEach(stage => {
                                let hasVisibleMatches = false;
                                stage.querySelectorAll('.match-card').forEach(card => {
                                    const searchableText = card.getAttribute('data-searchable');
                                    if (searchableText.includes(term)) {
                                        card.style.display = 'flex';
                                        hasVisibleMatches = true;
                                    } else {
                                        card.style.display = 'none';
                                    }
                                });
                                stage.style.display = hasVisibleMatches ? 'block' : 'none';
                            });
                        });
                    }

                    // Attach update listeners
                    document.querySelectorAll('.match-score-input').forEach(input => {
                        input.oninput = (e) => {
                            updateMatchScore(e.target.getAttribute('data-match-id'), e.target.getAttribute('data-team'), e.target.value);
                        };
                    });
                }
            }

            if (currentTab === 'standings') {
                const teamsList = Object.values(t.teams || {});
                const matchesList = Object.values(t.matches || {});
                
                // Feature: Export PDF Button added here
                let htmlBuilder = `
                    <div class="flex justify-end mb-4">
                        <button onclick="exportStandingsPDF()" class="flex items-center gap-2 bg-emerald-500/10 hover:bg-emerald-500 hover:text-slate-950 border border-emerald-500/30 text-emerald-400 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all shadow-lg">
                            <i data-lucide="download" class="w-3.5 h-3.5"></i> Export PDF
                        </button>
                    </div>
                    <div id="standings-content-to-export" class="p-2 bg-[#0a0f18] rounded-3xl">
                `;
                
                if (t.format.includes('Groups') && t.groupAssignments) {
                    const groups = [...new Set(Object.values(t.groupAssignments))].sort();
                    htmlBuilder += groups.map(gId => renderTableMarkup(`Group ${gId} Standings`, calculateStats(teamsList, matchesList, gId, t.groupAssignments))).join('');
                } else {
                    htmlBuilder += renderTableMarkup('Standings Leaderboard', calculateStats(teamsList, matchesList));
                }
                
                htmlBuilder += `</div>`; // close export container
                container.innerHTML = htmlBuilder;
            }
            refreshIcons();
        }

        // Global function for PDF Export
        window.exportStandingsPDF = function() {
            const element = document.getElementById('standings-content-to-export');
            if (!element) return;
            
            const t = tournaments.find(x => x.id === activeTournamentId);
            const fileName = t ? `${t.name.replace(/\s+/g, '_')}_Standings.pdf` : 'Tournament_Standings.pdf';

            // Options for html2pdf
            const opt = {
                margin:       [0.5, 0.5, 0.5, 0.5], // top, left, bottom, right
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#0a0f18', useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            // Using the loaded html2pdf library
            html2pdf().set(opt).from(element).save();
        };

        function renderTableMarkup(title, rows) {
            return `
                <div class="bg-slate-900 border border-slate-800 rounded-[2rem] overflow-hidden mb-6 shadow-xl print-container">
                    <div class="px-6 py-4 border-b border-slate-800/60"><h4 class="text-xs font-black uppercase text-slate-400">${title}</h4></div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left min-w-[500px]">
                            <thead>
                                <tr class="border-b border-slate-800 text-[10px] uppercase font-black text-slate-500 bg-slate-950/40">
                                    <th class="py-3 px-5 text-center w-12">Pos</th>
                                    <th class="py-3 px-4">Club Squad</th>
                                    <th class="py-3 px-3 text-center">P</th>
                                    <th class="py-3 px-3 text-center">W</th>
                                    <th class="py-3 px-3 text-center">D</th>
                                    <th class="py-3 px-3 text-center">L</th>
                                    <th class="py-3 px-3 text-center">GD</th>
                                    <th class="py-3 px-5 text-center text-emerald-400">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800/40 text-sm">
                                ${rows.map(([name, stat], i) => `
                                    <tr class="hover:bg-slate-800/10">
                                        <td class="py-3 px-5 text-center font-black text-slate-500">${i + 1}</td>
                                        <td class="py-3 px-4 font-bold text-slate-200">${escapeHtml(name)}</td>
                                        <td class="py-3 px-3 text-center text-slate-400">${stat.p}</td>
                                        <td class="py-3 px-3 text-center text-slate-400">${stat.w}</td>
                                        <td class="py-3 px-3 text-center text-slate-400">${stat.d}</td>
                                        <td class="py-3 px-3 text-center text-slate-400">${stat.l}</td>
                                        <td class="py-3 px-3 text-center font-bold text-slate-400">${stat.gd}</td>
                                        <td class="py-3 px-5 text-center font-black text-emerald-400 bg-emerald-500/[0.01]">${stat.pts}</td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        }

        // ---------- CORE CONTROL MODIFIERS ----------
        function attemptJoinDetail(id, viewOnlyRequested = false) {
            const t = tournaments.find(x => x.id === id);
            if (!t) return;
            pendingActionIsViewOnly = viewOnlyRequested;
            if (t.password && t.password.trim() !== '' && !viewOnlyRequested) {
                targetedLockedId = id;
                document.getElementById('entered-pin').value = '';
                document.getElementById('pin-modal').classList.remove('hidden');
            } else {
                launchDetailView(id, viewOnlyRequested);
            }
        }

        function launchDetailView(id, viewOnly) {
            activeTournamentId = id; isReadOnlyMode = viewOnly; currentTab = 'teams';
            const t = tournaments.find(x => x.id === id);
            document.getElementById('active-title').innerText = t.name;
            document.getElementById('active-format').innerText = `${t.format} (KO: Top ${t.koCount || 'None'})`;
            
            const badge = document.getElementById('role-badge');
            if(isReadOnlyMode) {
                badge.className = "flex items-center gap-1.5 bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full text-slate-400 text-[10px] font-black uppercase";
                badge.innerHTML = `<i data-lucide="eye" class="w-3.5 h-3.5"></i> Visitor`;
                document.getElementById('reset-tournament-btn').classList.add('hidden');
                document.getElementById('delete-arena-btn').classList.add('hidden');
            } else {
                badge.className = "flex items-center gap-1.5 bg-emerald-500 px-4 py-1.5 rounded-full text-slate-950 text-[10px] font-black uppercase";
                badge.innerHTML = `<i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Admin`;
                document.getElementById('reset-tournament-btn').classList.remove('hidden');
                document.getElementById('delete-arena-btn').classList.remove('hidden');
            }

            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('fab').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            renderTabsNav(); renderTabContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDashboard() {
            activeTournamentId = null;
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('fab').classList.remove('hidden');
            renderTournamentList();
        }

        function switchTab(tab) { currentTab = tab; renderTabsNav(); renderTabContent(); }
        function addTeam(name) {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || isReadOnlyMode) return;
            if (!t.teams) t.teams = {};
            const teamId = generateUUID();
            t.teams[teamId] = { id: teamId, name: name };
            pushUpdateData();
        }
        function removeTeam(teamId) {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (t && t.teams && !isReadOnlyMode) { delete t.teams[teamId]; pushUpdateData(); }
        }

        // Glitch Fix: Added parsing protection for score inputs
        function updateMatchScore(matchId, teamNum, scoreValue) {
            if (isReadOnlyMode) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t || !t.matches) return;
            
            const match = t.matches.find(m => m.id === matchId);
            if (match) {
                const targetProp = teamNum === "1" ? "s1" : "s2";
                
                // Parse correctly, ensuring empty strings remain empty and avoiding NaN errors
                let parsedScore = "";
                if (scoreValue !== "") {
                    parsedScore = parseInt(scoreValue, 10);
                    if (isNaN(parsedScore)) parsedScore = "";
                }
                
                match[targetProp] = parsedScore;
                pushUpdateData();
                evaluateAndAdvanceKnockout();
            }
        }

        // ---------- INITIALIZATION WIREFRAME EVENTS ----------
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fab').onclick = () => {
                document.getElementById('create-modal').classList.remove('hidden');
                toggleModalFields();
            };
            document.getElementById('close-modal-btn').onclick = () => document.getElementById('create-modal').classList.add('hidden');
            
            document.getElementById('create-tournament-btn').onclick = () => {
                const name = document.getElementById('arena-name').value.trim();
                if (!name) return alert("Missing Arena Name");
                const newId = generateUUID();
                
                tournaments.push({
                    id: newId,
                    name: name,
                    format: document.getElementById('arena-format').value,
                    koCount: document.getElementById('arena-ko-count').value,
                    includeLosersFinal: document.getElementById('arena-losers-final').checked,
                    password: document.getElementById('arena-pin').value.trim(),
                    teams: {}, matches: [], groupAssignments: {}, stage: ''
                });

                pushUpdateData();
                document.getElementById('create-modal').classList.add('hidden');
                launchDetailView(newId, false);
            };

            document.getElementById('unlock-room-btn').onclick = () => {
                const targetT = tournaments.find(x => x.id === targetedLockedId);
                if (targetT && targetT.password === document.getElementById('entered-pin').value) {
                    document.getElementById('pin-modal').classList.add('hidden');
                    launchDetailView(targetedLockedId, false);
                } else { alert("Invalid Entry PIN"); }
            };
            document.getElementById('cancel-pin-btn').onclick = () => document.getElementById('pin-modal').classList.add('hidden');

            document.getElementById('back-to-dashboard').onclick = showDashboard;
            document.getElementById('dashboard-link').onclick = showDashboard;

            document.getElementById('reset-tournament-btn').onclick = () => {
                if (isReadOnlyMode) return;
                if (confirm("Reset tournament data?")) {
                    const t = tournaments.find(x => x.id === activeTournamentId);
                    if (t) { t.matches = []; t.groupAssignments = {}; t.stage = ''; pushUpdateData(); switchTab('teams'); }
                }
            };
            document.getElementById('delete-arena-btn').onclick = () => {
                if (isReadOnlyMode) return;
                if (confirm("Permanently wipe this tournament arena?")) {
                    tournaments = tournaments.filter(x => x.id !== activeTournamentId);
                    pushUpdateData(); showDashboard();
                }
            };
        });
    </script>
</body>
</html>
