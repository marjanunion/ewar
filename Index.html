<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>eWAR | Real-Time Tournament Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#080d16', darkCard: '#111827' } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; transition: background 0.2s; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #10b98155; border-radius: 10px; }
        .glass-card { backdrop-filter: blur(12px); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.25s ease-out forwards; }
        .bracket-container { display: flex; gap: 2rem; overflow-x: auto; padding: 1rem 0; }
        .bracket-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 240px; }
        input:focus { border-color: #10b981 !important; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); outline: none; }
        .transition-smooth { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100">

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 glass-card bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 px-5 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3 cursor-pointer" id="dashboard-link">
            <div class="w-9 h-9 rounded-xl bg-emerald-500/10 flex items-center justify-center font-black text-emerald-500 text-lg">eW</div>
            <div>
                <h1 class="font-black italic text-xl tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-cyan-500">eWAR</h1>
                <p class="text-[8px] font-bold tracking-[0.2em] uppercase">REALTIME ARENA</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800">🌙</button>
            <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full text-[9px] font-bold">
                <span id="live-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span id="live-status">LIVE SYNC</span>
            </div>
        </div>
    </nav>

    <!-- NOTIFICATIONS -->
    <div id="toast-container" class="fixed top-20 right-5 z-[200] space-y-2"></div>

    <!-- DASHBOARD -->
    <main id="dashboard-view" class="max-w-5xl mx-auto p-5 space-y-6 animate-slide-up">
        <div class="bg-gradient-to-r from-emerald-600/10 to-cyan-600/10 rounded-3xl p-6 border border-emerald-500/20">
            <h2 class="text-3xl font-black">Real-Time<span class="text-emerald-500"> Arenas.</span></h2>
            <p class="text-slate-500 text-sm mt-1">Every score, every match — syncs live across all devices.</p>
        </div>
        <div id="tournament-list" class="grid sm:grid-cols-2 gap-5"></div>
    </main>

    <!-- TOURNAMENT DETAIL VIEW -->
    <main id="detail-view" class="max-w-6xl mx-auto hidden">
        <div class="sticky top-14 z-40 bg-slate-50/90 dark:bg-darkBg/90 backdrop-blur p-4 border-b">
            <div class="flex flex-wrap justify-between gap-3 items-center">
                <button id="back-btn" class="text-emerald-600 text-xs font-black uppercase flex gap-1">← Back</button>
                <div class="flex gap-2">
                    <button id="pdf-export" class="bg-white dark:bg-slate-800 border px-3 py-1.5 rounded-xl text-[9px] font-bold">📄 PDF Report</button>
                    <button id="reset-tourney" class="bg-white dark:bg-slate-800 border px-3 py-1.5 rounded-xl text-[9px] font-bold">⟳ Reset</button>
                    <button id="delete-arena" class="bg-red-50 dark:bg-red-500/10 text-red-600 px-3 py-1.5 rounded-xl text-[9px] font-bold">🗑 Delete</button>
                </div>
            </div>
            <div class="mt-3">
                <h2 id="detail-name" class="text-2xl font-black uppercase tracking-tight">Arena</h2>
                <p id="detail-format" class="text-[10px] font-bold text-slate-400 uppercase">format</p>
                <span id="role-badge" class="inline-block mt-1 text-[9px] bg-emerald-500 text-white px-3 py-0.5 rounded-full">ADMIN</span>
            </div>
        </div>
        <div class="flex border-b overflow-x-auto no-scrollbar" id="tab-bar"></div>
        <div id="tab-content" class="p-5"></div>
    </main>

    <!-- FAB BUTTON -->
    <button id="fab-btn" class="fixed bottom-7 right-7 bg-emerald-500 text-white p-4 rounded-2xl shadow-xl z-50">+</button>

    <!-- CREATE MODAL -->
    <div id="create-modal" class="fixed inset-0 z-[150] hidden bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-3xl max-w-md w-full p-6 space-y-4">
            <h3 class="text-2xl font-black text-emerald-500">⚡ New Arena</h3>
            <input id="new-name" placeholder="Arena Name" class="w-full p-3 rounded-xl border bg-slate-50 dark:bg-slate-800">
            <select id="new-format" class="w-full p-3 rounded-xl border">
                <option value="League Table (1 Leg)">League (1 Leg)</option>
                <option value="Groups + Knockout">Groups + Knockout</option>
                <option value="Pure Knockout">Pure Knockout</option>
            </select>
            <div id="ko-count-wrap" class="hidden">
                <label class="text-xs font-bold">Knockout size</label>
                <select id="new-ko-count" class="w-full p-3 rounded-xl border">
                    <option value="4">4 Teams</option>
                    <option value="8">8 Teams</option>
                </select>
            </div>
            <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" id="new-third-place" checked> Include 3rd Place Match
            </label>
            <input id="new-pin" type="password" placeholder="Admin PIN (optional)" class="w-full p-3 rounded-xl border">
            <div class="flex gap-3 pt-2">
                <button id="cancel-modal" class="flex-1 p-3 rounded-xl border">Cancel</button>
                <button id="confirm-create" class="flex-1 bg-emerald-500 text-white p-3 rounded-xl font-bold">CREATE</button>
            </div>
        </div>
    </div>

    <!-- PIN UNLOCK MODAL -->
    <div id="pin-modal" class="fixed inset-0 z-[150] hidden bg-black/80 flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl text-center max-w-sm">
            <div class="text-5xl mb-2">🔒</div>
            <h3 class="font-black">Admin Zone</h3>
            <input id="pin-input" type="password" placeholder="Enter PIN" class="w-full my-5 p-4 text-center text-xl rounded-2xl border">
            <div class="flex gap-2">
                <button id="spectate-mode" class="flex-1 p-3 rounded-xl border">Spectate</button>
                <button id="unlock-admin" class="flex-1 bg-emerald-500 text-white p-3 rounded-xl">Unlock</button>
            </div>
        </div>
    </div>

    <!-- HIDDEN PDF TEMPLATE -->
    <div id="pdf-template" class="hidden p-6 bg-white" style="width:800px">
        <h1 id="pdf-title" class="text-3xl font-black text-emerald-600">EWAR REPORT</h1>
        <div id="pdf-body" class="mt-4 space-y-4"></div>
    </div>

    <script type="module">
        // ---------------------------- FIREBASE IMPORTS ---------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ---------------------------- FIREBASE CONFIG (Your existing config) ----------
        const firebaseConfig = {
            apiKey: "AIzaSyBk1d837ftOEGco6B5bP0iTQwyKLw7VpeU",
            authDomain: "ewar-fa1db.firebaseapp.com",
            databaseURL: "https://ewar-fa1db-default-rtdb.firebaseio.com",
            projectId: "ewar-fa1db",
            storageBucket: "ewar-fa1db.firebasestorage.app",
            messagingSenderId: "287555570705",
            appId: "1:287555570705:web:bfbd53a520cf7fb8daf5b0",
            measurementId: "G-3P3RYNZXL0"
        };

        // Init Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        await signInAnonymously(auth);
        
        // Global state
        let tournaments = [];        // local cache
        let activeTournamentId = null;
        let currentTab = "teams";
        let isReadOnly = false;      // spectator vs admin
        let pendingUnlockId = null;

        // Helper: show toast
        function toast(msg, type = "info") {
            const container = document.getElementById("toast-container");
            const el = document.createElement("div");
            el.className = `bg-white dark:bg-slate-800 border-l-4 ${type === 'success' ? 'border-emerald-500' : 'border-red-500'} p-3 rounded-xl shadow-lg text-xs font-bold animate-slide-up`;
            el.innerHTML = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 2800);
        }

        // UUID generator
        function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random(); }

        // ************** REAL-TIME LISTENER **************
        // The core of "real time changes" — onSnapshot fires on every remote change.
        const tournamentsRef = collection(db, "ewar_tournaments");
        onSnapshot(tournamentsRef, (snapshot) => {
            tournaments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // preserve current active view
            renderTournamentList();
            if (activeTournamentId) {
                const stillExists = tournaments.find(t => t.id === activeTournamentId);
                if (!stillExists) {
                    showDashboard();
                    toast("Arena was deleted remotely", "info");
                } else {
                    // refresh current tab content to reflect real-time updates (scores, teams, matches)
                    renderTabsNav();
                    renderTabContent();
                    // auto-advance knockout after any score change
                    const current = tournaments.find(t => t.id === activeTournamentId);
                    if (current && !isReadOnly) autoAdvanceKnockout(current);
                }
            }
            document.getElementById("live-dot")?.classList.add("animate-pulse");
        });

        // Helper to push updates to Firestore (real-time sync)
        async function syncTournament(tourney) {
            if (!tourney.id) return;
            const docRef = doc(db, "ewar_tournaments", tourney.id);
            await setDoc(docRef, tourney);
        }

        // Delete tournament
        async function deleteArena(id) {
            await deleteDoc(doc(db, "ewar_tournaments", id));
            if (activeTournamentId === id) showDashboard();
            toast("Arena deleted", "success");
        }

        // ---------- Core Logic: Knockout auto-advance ----------
        function autoAdvanceKnockout(t) {
            if (!t.matches || t.matches.length === 0) return;
            if (t.format === "League Table (1 Leg)") return;

            const matchesArr = t.matches;
            const stagesOrder = ["Round of 16", "Quarterfinals", "Semifinals", "Final"];
            const currentStage = t.stage;
            if (currentStage === "Final") return;

            // check if all matches of current stage are completed
            const stageMatches = matchesArr.filter(m => m.stage === currentStage);
            if (stageMatches.length === 0) return;
            const allFinished = stageMatches.every(m => m.s1 !== "" && m.s2 !== "");
            if (!allFinished) return;

            // extract winners
            let winners = [];
            stageMatches.sort((a,b) => (a.koIndex || 0) - (b.koIndex || 0)).forEach(m => {
                const s1 = parseInt(m.s1 || 0,10);
                const s2 = parseInt(m.s2 || 0,10);
                const p1 = parseInt(m.p1 || 0,10);
                const p2 = parseInt(m.p2 || 0,10);
                let winner = s1 > s2 ? m.t1 : (s2 > s1 ? m.t2 : (p1 > p2 ? m.t1 : m.t2));
                winners.push(winner);
            });
            if (winners.length === 0) return;

            const nextIdx = stagesOrder.indexOf(currentStage) + 1;
            if (nextIdx >= stagesOrder.length) return;
            const nextStage = stagesOrder[nextIdx];
            t.stage = nextStage;

            // generate next round matches
            const nextRoundSize = winners.length;
            for (let i = 0; i < nextRoundSize; i += 2) {
                t.matches.push({
                    id: uuid(),
                    t1: winners[i] || "TBD",
                    t2: winners[i+1] || "TBD",
                    s1: "", s2: "", p1: "", p2: "",
                    stage: nextStage,
                    koIndex: i/2
                });
            }
            // 3rd place match if needed
            if (nextStage === "Final" && t.includeLosersFinal) {
                const thirdExists = t.matches.some(m => m.stage === "3rd Place Match");
                if (!thirdExists) {
                    t.matches.push({
                        id: uuid(), t1: "TBD", t2: "TBD", s1: "", s2: "", p1: "", p2: "",
                        stage: "3rd Place Match", koIndex: 99
                    });
                }
            }
            syncTournament(t);
            toast(`Advanced to ${nextStage}!`, "success");
        }

        // Standings calculation (league & groups)
        function calcStandings(teamsObj, matchesArr, groupFilter = null, groupMap = null) {
            let stats = {};
            Object.values(teamsObj || {}).forEach(t => { stats[t.name] = { name: t.name, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 }; });
            matchesArr.forEach(m => {
                if (groupFilter && groupMap && groupMap[m.t1] !== groupFilter) return;
                if (m.s1 === "" || m.s2 === "") return;
                const s1 = parseInt(m.s1,10), s2 = parseInt(m.s2,10);
                if (!stats[m.t1]) stats[m.t1] = { name:m.t1, p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };
                if (!stats[m.t2]) stats[m.t2] = { name:m.t2, p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0 };
                stats[m.t1].p++; stats[m.t2].p++;
                stats[m.t1].gf += s1; stats[m.t1].ga += s2;
                stats[m.t2].gf += s2; stats[m.t2].ga += s1;
                if (s1 > s2) { stats[m.t1].w++; stats[m.t1].pts+=3; stats[m.t2].l++; }
                else if (s2 > s1) { stats[m.t2].w++; stats[m.t2].pts+=3; stats[m.t1].l++; }
                else { stats[m.t1].d++; stats[m.t2].d++; stats[m.t1].pts+=1; stats[m.t2].pts+=1; }
            });
            let arr = Object.values(stats);
            arr.forEach(s => { s.gd = s.gf - s.ga; });
            return arr.sort((a,b)=> b.pts - a.pts || b.gd - a.gd);
        }

        // generate initial matches (called by admin)
        async function generateInitialMatches(t) {
            let teamsArr = Object.values(t.teams || {});
            if (teamsArr.length < 2) { toast("Need at least 2 teams", "error"); return false; }
            let newMatches = [];
            if (t.format === "League Table (1 Leg)") {
                for (let i=0; i<teamsArr.length; i++) {
                    for (let j=i+1; j<teamsArr.length; j++) {
                        newMatches.push({ id: uuid(), t1: teamsArr[i].name, t2: teamsArr[j].name, s1:"", s2:"", p1:"", p2:"", stage: "League" });
                    }
                }
                t.stage = "League";
            } else if (t.format === "Groups + Knockout") {
                // create 2 groups
                const shuffled = [...teamsArr].sort(()=>0.5-Math.random());
                const groupSize = Math.ceil(shuffled.length/2);
                const groupA = shuffled.slice(0, groupSize);
                const groupB = shuffled.slice(groupSize);
                const assignments = {};
                groupA.forEach(team => assignments[team.name] = "A");
                groupB.forEach(team => assignments[team.name] = "B");
                t.groupAssignments = assignments;
                // group matches
                [...groupA, ...groupB].forEach((_, idx) => {});
                const generateGroupMatches = (groupArr, groupName) => {
                    for(let i=0;i<groupArr.length;i++) {
                        for(let j=i+1;j<groupArr.length;j++) {
                            newMatches.push({ id: uuid(), t1: groupArr[i].name, t2: groupArr[j].name, s1:"", s2:"", stage: `Group ${groupName}`, grp: groupName });
                        }
                    }
                };
                generateGroupMatches(groupA, "A");
                generateGroupMatches(groupB, "B");
                t.stage = "Group Stage";
            } else if (t.format === "Pure Knockout") {
                const koSize = parseInt(t.koCount || 4, 10);
                const qualified = teamsArr.slice(0, koSize);
                const bracketSize = qualified.length;
                for (let i=0; i<bracketSize; i+=2) {
                    newMatches.push({ id: uuid(), t1: qualified[i]?.name || "TBD", t2: qualified[i+1]?.name || "TBD", s1:"", s2:"", p1:"", p2:"", stage: "Quarterfinals", koIndex: i/2 });
                }
                t.stage = "Quarterfinals";
                if (t.includeLosersFinal) t.includeLosersFinal = true;
            }
            t.matches = newMatches;
            await syncTournament(t);
            toast("Tournament brackets generated!", "success");
            return true;
        }

        // ---------- UI RENDERING ----------
        function renderTournamentList() {
            const container = document.getElementById("tournament-list");
            if (!tournaments.length) {
                container.innerHTML = `<div class="col-span-full text-center p-12 border-2 border-dashed rounded-3xl text-slate-400">⚡ No active arenas. Click + to create.</div>`;
                return;
            }
            container.innerHTML = tournaments.map(t => `
                <div onclick="window.__openTourney('${t.id}')" class="bg-white dark:bg-slate-900 border rounded-2xl p-5 cursor-pointer hover:border-emerald-500 transition-all">
                    <div class="flex justify-between"><span class="text-[9px] font-black uppercase">${t.format}</span><span>${t.pin ? "🔒" : "🌐"}</span></div>
                    <h3 class="font-black text-lg mt-2">${escapeHtml(t.name)}</h3>
                    <div class="mt-4 text-[9px] text-slate-400">Teams: ${t.teams ? Object.keys(t.teams).length : 0} | Stage: ${t.stage || "Setup"}</div>
                </div>
            `).join("");
        }
        window.__openTourney = (id) => openTournament(id);
        
        function openTournament(id) {
            const t = tournaments.find(x => x.id === id);
            if (!t) return;
            if (t.pin && t.pin !== "") {
                pendingUnlockId = id;
                document.getElementById("pin-modal").classList.remove("hidden");
                return;
            }
            isReadOnly = false;
            activeTournamentId = id;
            loadDetailView(t);
        }

        function loadDetailView(t) {
            document.getElementById("dashboard-view").classList.add("hidden");
            document.getElementById("detail-view").classList.remove("hidden");
            document.getElementById("detail-name").innerText = t.name;
            document.getElementById("detail-format").innerText = t.format;
            const badgeSpan = document.getElementById("role-badge");
            if (isReadOnly) { badgeSpan.innerText = "👁️ SPECTATOR"; badgeSpan.className = "bg-slate-500 text-white text-[9px] px-3 py-0.5 rounded-full"; }
            else { badgeSpan.innerText = "⚡ ADMIN"; badgeSpan.className = "bg-emerald-500 text-white text-[9px] px-3 py-0.5 rounded-full"; }
            currentTab = (t.matches && t.matches.length) ? "matches" : "teams";
            renderTabsNav();
            renderTabContent();
        }

        function renderTabsNav() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const tabs = [{id:"teams", label:"TEAMS"}];
            if (t.matches?.length) tabs.push({id:"matches", label:"FIXTURES"});
            if (t.matches?.length && (t.format.includes("League") || t.format.includes("Groups"))) tabs.push({id:"standings", label:"STANDINGS"});
            if (t.matches?.length && t.format !== "League Table (1 Leg)") tabs.push({id:"bracket", label:"BRACKET"});
            const bar = document.getElementById("tab-bar");
            bar.innerHTML = tabs.map(tab => `<button class="px-5 py-3 text-[9px] font-black uppercase border-b-2 ${currentTab===tab.id ? 'border-emerald-500 text-emerald-500' : 'border-transparent'}" onclick="switchTab('${tab.id}')">${tab.label}</button>`).join("");
        }
        window.switchTab = function(tabId) { currentTab = tabId; renderTabsNav(); renderTabContent(); };

        function renderTabContent() {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const container = document.getElementById("tab-content");
            if (currentTab === "teams") {
                const teamsArr = t.teams ? Object.values(t.teams) : [];
                container.innerHTML = `
                    ${!isReadOnly && (!t.matches || t.matches.length===0) ? `<div class="flex gap-3 mb-5"><input id="team-input" placeholder="Team name" class="flex-1 p-3 rounded-xl border"><button onclick="addTeam()" class="bg-emerald-500 px-5 rounded-xl text-white">Add</button></div>` : ''}
                    <div class="bg-white dark:bg-slate-900 rounded-2xl overflow-hidden border">
                        <table class="w-full text-left"><thead><tr class="bg-slate-100 dark:bg-slate-800 text-[9px]"><th class="p-4">#</th><th>Team</th>${!isReadOnly && (!t.matches || !t.matches.length) ? '<th></th>' : ''}</tr></thead>
                        <tbody>${teamsArr.map((tm,idx)=>`
                            <tr class="border-t"><td class="p-4">${idx+1}</td><td class="font-bold">${escapeHtml(tm.name)}</td>
                            ${!isReadOnly && (!t.matches || !t.matches.length) ? `<td><button onclick="removeTeam('${tm.name}')" class="text-red-500 text-[9px]">✖</button></td>` : ''}</tr>
                        `).join('')}</tbody></table>
                    </div>
                    ${!isReadOnly && (!t.matches || t.matches.length===0) && teamsArr.length>=2 ? `<div class="mt-6 text-center"><button onclick="startTournamentDraw()" class="bg-gradient-to-r from-emerald-500 to-cyan-500 text-white px-8 py-3 rounded-full text-xs font-black">🚀 START TOURNAMENT</button></div>` : ''}
                `;
            } else if (currentTab === "matches") {
                const matches = t.matches || [];
                const groups = {};
                matches.forEach(m => { let key = m.stage || "Matches"; if (!groups[key]) groups[key]=[]; groups[key].push(m); });
                container.innerHTML = `<div class="space-y-6">` + Object.entries(groups).map(([stage, list]) => `
                    <div><h4 class="text-xs font-black text-slate-400 uppercase mb-2">${stage}</h4><div class="grid md:grid-cols-2 gap-3">${list.map(m => `
                        <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border flex flex-col gap-2">
                            <div class="flex justify-between items-center"><span class="font-black text-sm">${escapeHtml(m.t1)}</span><input type="number" ${isReadOnly ? 'disabled' : ''} value="${m.s1}" onchange="updateMatch('${m.id}',1,this.value)" class="w-14 p-1 text-center border rounded"></div>
                            <div class="flex justify-between items-center"><span class="font-black text-sm">${escapeHtml(m.t2)}</span><input type="number" ${isReadOnly ? 'disabled' : ''} value="${m.s2}" onchange="updateMatch('${m.id}',2,this.value)" class="w-14 p-1 text-center border rounded"></div>
                            ${m.s1 !== "" && m.s2 !== "" && parseInt(m.s1)===parseInt(m.s2) ? `<div class="flex gap-2 text-[9px]"><span>Pens:</span><input type="number" value="${m.p1||''}" onchange="updatePen('${m.id}',1,this.value)" class="w-12 p-1 border rounded"><span>-</span><input type="number" value="${m.p2||''}" onchange="updatePen('${m.id}',2,this.value)" class="w-12 p-1 border rounded"></div>` : ''}
                        </div>
                    `).join('')}</div></div>`).join('')}</div>`;
            } else if (currentTab === "standings") {
                const matches = t.matches || [];
                const teamsObj = t.teams || {};
                if (t.format === "Groups + Knockout") {
                    const groupAStandings = calcStandings(teamsObj, matches, "A", t.groupAssignments);
                    const groupBStandings = calcStandings(teamsObj, matches, "B", t.groupAssignments);
                    container.innerHTML = `<div class="space-y-5">${renderTable("Group A", groupAStandings)}${renderTable("Group B", groupBStandings)}</div>`;
                } else {
                    const standings = calcStandings(teamsObj, matches);
                    container.innerHTML = renderTable("League Table", standings);
                }
            } else if (currentTab === "bracket") {
                const matches = t.matches || [];
                const knockoutStages = ["Quarterfinals","Semifinals","Final","3rd Place Match"];
                const filtered = knockoutStages.filter(s => matches.some(m => m.stage === s));
                let html = `<div class="bracket-container">`;
                filtered.forEach(stage => {
                    const stageMatches = matches.filter(m => m.stage === stage).sort((a,b)=> (a.koIndex||0)-(b.koIndex||0));
                    html += `<div class="bracket-round"><div class="font-black text-xs text-center mb-3">${stage}</div>`;
                    stageMatches.forEach(m => {
                        html += `<div class="bg-white dark:bg-slate-900 p-3 my-2 rounded-xl border text-xs space-y-1"><div>${escapeHtml(m.t1)} ${m.s1}${m.p1?`(${m.p1})`:''}</div><div>${escapeHtml(m.t2)} ${m.s2}${m.p2?`(${m.p2})`:''}</div></div>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;
                container.innerHTML = html;
            }
        }

        function renderTable(title, data) {
            return `<div class="bg-white dark:bg-slate-900 rounded-2xl border overflow-x-auto"><h4 class="p-3 font-black text-xs">${title}</h4><table class="w-full text-[10px]"><thead><tr class="bg-slate-100"><th class="p-2">Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>${data.map((s,i)=>`<tr class="border-t"><td class="p-2">${i+1}</td><td class="font-bold">${s.name}</td><td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gd}</td><td class="font-black text-emerald-500">${s.pts}</td></tr>`).join('')}</tbody></table></div>`;
        }

        // Score update handler (live)
        window.updateMatch = async (matchId, idx, val) => {
            if (isReadOnly) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const match = t.matches.find(m => m.id === matchId);
            if (match) { if (idx===1) match.s1 = val; else match.s2 = val; }
            await syncTournament(t);
            autoAdvanceKnockout(t);
        };
        window.updatePen = async (matchId, idx, val) => {
            if (isReadOnly) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            const match = t.matches.find(m => m.id === matchId);
            if (match) { if (idx===1) match.p1 = val; else match.p2 = val; }
            await syncTournament(t);
            autoAdvanceKnockout(t);
        };
        window.addTeam = async () => {
            const inp = document.getElementById("team-input");
            const name = inp.value.trim();
            if (!name) return;
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            if (!t.teams) t.teams = {};
            if (t.teams[name]) { toast("Team exists"); return; }
            t.teams[name] = { name };
            inp.value = "";
            await syncTournament(t);
            renderTabContent();
        };
        window.removeTeam = async (team) => {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            delete t.teams[team];
            await syncTournament(t);
            renderTabContent();
        };
        window.startTournamentDraw = async () => {
            const t = tournaments.find(x => x.id === activeTournamentId);
            if (!t) return;
            await generateInitialMatches(t);
            renderTabContent();
            renderTabsNav();
        };

        // UI listeners
        document.getElementById("fab-btn").onclick = () => document.getElementById("create-modal").classList.remove("hidden");
        document.getElementById("cancel-modal").onclick = () => document.getElementById("create-modal").classList.add("hidden");
        document.getElementById("confirm-create").onclick = async () => {
            const name = document.getElementById("new-name").value.trim();
            if (!name) { toast("Name required"); return; }
            const format = document.getElementById("new-format").value;
            const koCount = document.getElementById("new-ko-count").value;
            const thirdPlace = document.getElementById("new-third-place").checked;
            const pin = document.getElementById("new-pin").value;
            const newId = uuid();
            const newTourney = { id: newId, name, format, koCount, includeLosersFinal: thirdPlace, pin: pin || "", stage: "Setup", teams: {}, matches: [] };
            if (format === "Pure Knockout") newTourney.koCount = koCount;
            await setDoc(doc(db, "ewar_tournaments", newId), newTourney);
            document.getElementById("create-modal").classList.add("hidden");
            toast(`Arena "${name}" created!`, "success");
        };
        document.getElementById("unlock-admin").onclick = () => {
            const pin = document.getElementById("pin-input").value;
            const t = tournaments.find(x => x.id === pendingUnlockId);
            if (t && t.pin === pin) { isReadOnly = false; activeTournamentId = pendingUnlockId; document.getElementById("pin-modal").classList.add("hidden"); loadDetailView(t); toast("Admin mode unlocked"); }
            else toast("Wrong PIN", "error");
        };
        document.getElementById("spectate-mode").onclick = () => {
            isReadOnly = true; activeTournamentId = pendingUnlockId; const t = tournaments.find(x=>x.id===pendingUnlockId); if(t) loadDetailView(t); document.getElementById("pin-modal").classList.add("hidden");
        };
        document.getElementById("dashboard-link").onclick = () => showDashboard();
        document.getElementById("back-btn").onclick = () => showDashboard();
        document.getElementById("delete-arena").onclick = async () => { if(confirm("Delete permanent?")) await deleteArena(activeTournamentId); };
        document.getElementById("reset-tourney").onclick = async () => {
            if(isReadOnly) return;
            const t = tournaments.find(x=>x.id===activeTournamentId);
            if(t) { t.matches = []; t.stage="Setup"; await syncTournament(t); switchTab("teams"); toast("Reset done"); }
        };
        document.getElementById("pdf-export").onclick = () => {
            const t = tournaments.find(x=>x.id===activeTournamentId);
            if(!t) return;
            document.getElementById("pdf-title").innerText = t.name;
            document.getElementById("pdf-body").innerHTML = `<p>Format: ${t.format}</p><p>Teams: ${Object.values(t.teams||{}).map(i=>i.name).join(", ")}</p>`;
            const element = document.getElementById("pdf-template");
            element.classList.remove("hidden");
            html2pdf().from(element).set({filename:`${t.name}_report.pdf`}).save().then(()=>element.classList.add("hidden"));
        };
        function showDashboard() { document.getElementById("dashboard-view").classList.remove("hidden"); document.getElementById("detail-view").classList.add("hidden"); activeTournamentId = null; }
        document.getElementById("theme-toggle").onclick = () => document.documentElement.classList.toggle("dark");
        function escapeHtml(str) { return (str||'').replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        renderTournamentList();
    </script>
</body>
</html>
