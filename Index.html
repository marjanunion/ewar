<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eWAR | Create Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background-color: #0a0f18; color: #f1f5f9; }
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #34d399 0%, #06b6d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            z-index: 100;
            transition: transform 0.2s;
        }
        .fab:hover {
            transform: scale(1.1);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 30px;
            max-width: 400px;
            width: 90%;
        }
        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 15px;
            color: white;
        }
        button {
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: #10b981;
            color: #0f172a;
        }
        .btn-secondary {
            background: #334155;
            color: white;
        }
        .arena-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .arena-card:hover {
            background: #334155;
            transform: translateX(5px);
        }
    </style>
</head>
<body>

    <!-- Simple Navigation -->
    <div style="padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #34d399, #06b6d4); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="trophy" style="color: #0f172a; width: 22px; height: 22px;"></i>
            </div>
            <div>
                <h1 style="font-weight: 900; font-size: 20px;">eWAR</h1>
                <p style="font-size: 9px; color: #64748b;">GLOBAL ARENA</p>
            </div>
        </div>
        <button onclick="deleteAllArenas()" style="background: #1e293b; padding: 8px 15px; border-radius: 12px; font-size: 12px;">
            <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i> Delete All
        </button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div style="background: #1e293b; border-radius: 25px; padding: 30px; margin-bottom: 20px;">
            <h2 style="font-size: 28px; font-weight: 900;">Live <span style="color: #10b981;">Arenas</span></h2>
            <p style="color: #94a3b8; font-size: 12px;">Create or join a tournament room</p>
        </div>
        
        <div id="arenaList">
            <div style="text-align: center; padding: 50px; color: #64748b;">Loading arenas...</div>
        </div>
    </div>

    <!-- Arena Detail View (hidden initially) -->
    <div id="detailView" style="display: none; max-width: 800px; margin: 0 auto; padding: 20px;">
        <button onclick="backToDashboard()" style="background: #1e293b; margin-bottom: 20px;">← Back to Arenas</button>
        <div id="arenaDetail"></div>
    </div>

    <!-- FAB - CREATE BUTTON (VISIBLE) -->
    <div class="fab" onclick="openCreateModal()">
        <i data-lucide="plus" style="width: 32px; height: 32px; color: #0f172a; stroke-width: 3;"></i>
    </div>

    <!-- Create Tournament Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3 style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">⚔️ Create Arena</h3>
            <input type="text" id="arenaName" placeholder="Arena Name (e.g., Cyber Cup)">
            <select id="arenaFormat">
                <option value="Groups + Knockout">Groups + Knockout</option>
                <option value="League Table (1 Leg)">League Table (1 Leg)</option>
                <option value="League Table (2 Legs)">League Table (2 Legs)</option>
            </select>
            <input type="text" id="arenaPassword" placeholder="Password (leave empty for public)">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-secondary" onclick="closeCreateModal()" style="flex: 1;">Cancel</button>
                <button class="btn-primary" onclick="createTournament()" style="flex: 1;">Create Arena</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBk1d837ftOEGco6B5bP0iTQwyKLw7VpeU",
            authDomain: "ewar-fa1db.firebaseapp.com",
            projectId: "ewar-fa1db",
            storageBucket: "ewar-fa1db.firebasestorage.app",
            messagingSenderId: "287555570705",
            appId: "1:287555570705:web:bfbd53a520cf7fb8daf5b0",
            databaseURL: "https://ewar-fa1db-default-rtdb.firebaseio.com"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let currentRoomId = null;
        
        // Helper functions
        function generateId() {
            return Date.now().toString() + '_' + Math.random().toString(36).substring(2, 8);
        }
        
        function simpleHash(str) {
            if (!str) return '';
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        
        // Load all arenas
        function loadArenas() {
            db.ref('tournaments').once('value').then(snapshot => {
                const arenas = snapshot.val() || {};
                const arenaList = document.getElementById('arenaList');
                
                if (Object.keys(arenas).length === 0) {
                    arenaList.innerHTML = `
                        <div style="text-align: center; padding: 50px; border: 2px dashed #334155; border-radius: 25px;">
                            <p style="color: #64748b;">No arenas yet</p>
                            <p style="color: #475569; font-size: 12px; margin-top: 10px;">Click the + button to create one</p>
                        </div>
                    `;
                    return;
                }
                
                arenaList.innerHTML = '';
                Object.entries(arenas).forEach(([id, arena]) => {
                    const isPrivate = arena.passwordHash && arena.passwordHash !== '';
                    const div = document.createElement('div');
                    div.className = 'arena-card';
                    div.onclick = () => joinArena(id, arena.passwordHash);
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="font-weight: bold; font-size: 18px;">${escapeHtml(arena.name)}</h3>
                                <div style="display: flex; gap: 10px; margin-top: 5px; font-size: 11px;">
                                    <span style="color: #10b981;">${arena.format || 'League'}</span>
                                    <span style="color: #64748b;">•</span>
                                    <span>${arena.teams?.length || 0} teams</span>
                                    <span style="color: ${isPrivate ? '#f59e0b' : '#10b981'}">${isPrivate ? '🔒 Private' : '🌍 Public'}</span>
                                </div>
                            </div>
                            <i data-lucide="chevron-right" style="width: 20px; height: 20px; color: #64748b;"></i>
                        </div>
                    `;
                    arenaList.appendChild(div);
                });
                lucide.createIcons();
            }).catch(err => {
                console.error(err);
                document.getElementById('arenaList').innerHTML = '<div style="color: red;">Error loading arenas. Check Firebase rules.</div>';
            });
        }
        
        function joinArena(roomId, passwordHash) {
            if (passwordHash && passwordHash !== '') {
                const pwd = prompt("Enter room password:");
                if (!pwd || simpleHash(pwd) !== passwordHash) {
                    alert("Wrong password!");
                    return;
                }
            }
            
            currentRoomId = roomId;
            
            // Listen for realtime updates
            db.ref(`tournaments/${roomId}`).on('value', (snapshot) => {
                const arena = snapshot.val();
                if (arena) {
                    renderArenaDetail(arena);
                }
            });
            
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('detailView').style.display = 'block';
        }
        
        function renderArenaDetail(arena) {
            const container = document.getElementById('arenaDetail');
            const teams = arena.teams || [];
            const matches = arena.matches || [];
            
            // Calculate standings
            const standings = {};
            teams.forEach(team => {
                standings[team.name] = { wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, pts: 0 };
            });
            
            matches.forEach(m => {
                if (standings[m.t1] && standings[m.t2] && m.s1 !== null && m.s2 !== null) {
                    standings[m.t1].gf += m.s1;
                    standings[m.t1].ga += m.s2;
                    standings[m.t2].gf += m.s2;
                    standings[m.t2].ga += m.s1;
                    
                    if (m.s1 > m.s2) {
                        standings[m.t1].wins++;
                        standings[m.t1].pts += 3;
                        standings[m.t2].losses++;
                    } else if (m.s2 > m.s1) {
                        standings[m.t2].wins++;
                        standings[m.t2].pts += 3;
                        standings[m.t1].losses++;
                    } else {
                        standings[m.t1].draws++;
                        standings[m.t1].pts += 1;
                        standings[m.t2].draws++;
                        standings[m.t2].pts += 1;
                    }
                }
            });
            
            const standingsList = Object.entries(standings).sort((a, b) => b[1].pts - a[1].pts);
            
            container.innerHTML = `
                <div style="background: #1e293b; border-radius: 25px; padding: 25px; margin-bottom: 20px;">
                    <h2 style="font-size: 28px; font-weight: 900;">${escapeHtml(arena.name)}</h2>
                    <p style="color: #94a3b8; font-size: 12px;">${arena.format}</p>
                </div>
                
                <!-- Teams Tab -->
                <div style="margin-bottom: 30px;">
                    <h3 style="font-weight: bold; margin-bottom: 15px;">Teams</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <input type="text" id="newTeamName" placeholder="Team name" style="flex: 1;">
                        <button onclick="addTeam()" class="btn-primary" style="padding: 12px 20px;">Add Team</button>
                    </div>
                    <div id="teamsList">
                        ${teams.map(team => `
                            <div style="background: #0f172a; padding: 12px 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between;">
                                <span>${escapeHtml(team.name)}</span>
                                <button onclick="removeTeam('${team.id}')" style="background: none; color: #ef4444; padding: 0;">Remove</button>
                            </div>
                        `).join('')}
                        ${teams.length === 0 ? '<div style="color: #64748b; text-align: center; padding: 20px;">No teams added yet</div>' : ''}
                    </div>
                </div>
                
                <!-- Matches Tab -->
                <div style="margin-bottom: 30px;">
                    <h3 style="font-weight: bold; margin-bottom: 15px;">Matches</h3>
                    ${matches.length === 0 ? `
                        <button onclick="generateFixtures()" class="btn-primary" style="width: 100%;">Generate Fixtures</button>
                    ` : `
                        ${matches.map((m, idx) => `
                            <div style="background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 10px;">
                                <div style="display: flex; gap: 10px; align-items: center;">
                                    <div style="flex: 1; font-weight: bold;">${escapeHtml(m.t1)}</div>
                                    <input type="number" id="score1_${idx}" value="${m.s1 ?? ''}" onchange="updateScore(${idx}, 's1', this.value)" style="width: 60px; text-align: center; margin-bottom: 0;">
                                    <span>VS</span>
                                    <input type="number" id="score2_${idx}" value="${m.s2 ?? ''}" onchange="updateScore(${idx}, 's2', this.value)" style="width: 60px; text-align: center; margin-bottom: 0;">
                                    <div style="flex: 1; font-weight: bold; text-align: right;">${escapeHtml(m.t2)}</div>
                                </div>
                            </div>
                        `).join('')}
                    `}
                </div>
                
                <!-- Standings Tab -->
                <div>
                    <h3 style="font-weight: bold; margin-bottom: 15px;">Standings</h3>
                    <div style="background: #0f172a; border-radius: 15px; overflow-x: auto;">
                        <table style="width: 100%;">
                            <thead style="background: #1e293b;">
                                <tr style="font-size: 12px;">
                                    <th style="padding: 12px; text-align: left;">Team</th>
                                    <th style="padding: 12px; text-align: center;">W</th>
                                    <th style="padding: 12px; text-align: center;">D</th>
                                    <th style="padding: 12px; text-align: center;">L</th>
                                    <th style="padding: 12px; text-align: center;">GD</th>
                                    <th style="padding: 12px; text-align: center;">PTS</th>
                                 </tr>
                            </thead>
                            <tbody>
                                ${standingsList.map(([name, stats]) => `
                                    <tr style="border-top: 1px solid #334155;">
                                        <td style="padding: 10px;">${escapeHtml(name)}</td>
                                        <td style="padding: 10px; text-align: center;">${stats.wins}</td>
                                        <td style="padding: 10px; text-align: center;">${stats.draws}</td>
                                        <td style="padding: 10px; text-align: center;">${stats.losses}</td>
                                        <td style="padding: 10px; text-align: center;">${stats.gf - stats.ga}</td>
                                        <td style="padding: 10px; text-align: center; color: #10b981; font-weight: bold;">${stats.pts}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }
        
        // CRUD Operations
        window.addTeam = async function() {
            const input = document.getElementById('newTeamName');
            const name = input.value.trim();
            if (!name) return;
            
            const arenaRef = db.ref(`tournaments/${currentRoomId}`);
            const snapshot = await arenaRef.once('value');
            const arena = snapshot.val();
            const teams = arena.teams || [];
            
            if (teams.some(t => t.name === name)) {
                alert("Team already exists!");
                return;
            }
            
            teams.push({ id: generateId(), name: name });
            await arenaRef.update({ teams: teams });
            input.value = '';
        };
        
        window.removeTeam = async function(teamId) {
            const arenaRef = db.ref(`tournaments/${currentRoomId}`);
            const snapshot = await arenaRef.once('value');
            const arena = snapshot.val();
            const teams = (arena.teams || []).filter(t => t.id !== teamId);
            await arenaRef.update({ teams: teams });
        };
        
        window.updateScore = async function(matchIdx, side, value) {
            const arenaRef = db.ref(`tournaments/${currentRoomId}`);
            const snapshot = await arenaRef.once('value');
            const arena = snapshot.val();
            const matches = [...(arena.matches || [])];
            let num = value === '' ? null : Number(value);
            if (isNaN(num)) num = null;
            matches[matchIdx][side] = num;
            await arenaRef.update({ matches: matches });
        };
        
        window.generateFixtures = async function() {
            const arenaRef = db.ref(`tournaments/${currentRoomId}`);
            const snapshot = await arenaRef.once('value');
            const arena = snapshot.val();
            const teams = arena.teams || [];
            
            if (teams.length < 2) {
                alert("Need at least 2 teams!");
                return;
            }
            
            const matches = [];
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    matches.push({
                        id: generateId(),
                        t1: teams[i].name,
                        t2: teams[j].name,
                        s1: null,
                        s2: null,
                        stage: 'League'
                    });
                }
            }
            await arenaRef.update({ matches: matches });
        };
        
        // CREATE TOURNAMENT - MAIN FU
